<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Forex Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .sidebar-link { transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

<script>
// ============================================
// STATE MANAGEMENT
// ============================================
const store = {
    token: localStorage.getItem('token'),
    user: JSON.parse(localStorage.getItem('user') || 'null'),
    isAdmin: false,
    currentView: 'login',
    loading: false,
    
    setToken(token) {
        this.token = token || null;
        if (token && token.trim()) {
            localStorage.setItem('token', token);
        } else {
            localStorage.removeItem('token');
        }
    },
    
    setUser(user) {
        this.user = user;
        this.isAdmin = user?.role === 'admin';
        if (user) {
            localStorage.setItem('user', JSON.stringify(user));
        } else {
            localStorage.removeItem('user');
        }
    },
    
    logout() {
        this.setToken(null);
        this.setUser(null);
        this.isAdmin = false;
        this.currentView = 'login';
    }
};

// ============================================
// API CLIENT - FIXED: Proper baseUrl and error handling
// ============================================
const api = {
    baseUrl: window.location.origin,
    
    async request(endpoint, options = {}) {
        const url = `${this.baseUrl}/api${endpoint}`;
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        
        if (store.token) {
            headers['Authorization'] = `Bearer ${store.token}`;
        }
        
        console.log(`API Request: ${options.method || 'GET'} ${url}`);
        
        try {
            const response = await fetch(url, { 
                ...options, 
                headers,
                credentials: 'same-origin'
            });
            
            console.log(`API Response: ${response.status} ${response.statusText}`);
            
            // Handle 401/403 explicitly
            if (response.status === 401) {
                store.logout();
                renderApp();
                throw new Error('Session expired. Please sign in again.');
            }
            
            if (response.status === 403) {
                throw new Error('Access denied. Insufficient permissions.');
            }
            
            if (response.status === 405) {
                throw new Error('Method not allowed. Please check API configuration.');
            }
            
            // Try to parse JSON, but handle empty responses
            let data = null;
            const contentType = response.headers.get('content-type');
            if (contentType && contentType.includes('application/json')) {
                data = await response.json();
            } else {
                const text = await response.text();
                console.log('Non-JSON response:', text);
                if (!response.ok) {
                    throw new Error(text || `HTTP ${response.status}: ${response.statusText}`);
                }
                return { success: true, text };
            }
            
            if (!response.ok) {
                const errorMsg = data?.detail || data?.message || `HTTP ${response.status}: ${response.statusText}`;
                throw new Error(errorMsg);
            }
            
            // FIXED: Validate response has expected data
            if (!data) {
                throw new Error('Empty response from server');
            }
            
            return data;
        } catch (error) {
            console.error('API Error:', error);
            if (error.message === 'Failed to fetch') {
                throw new Error('Cannot connect to server. Please check your internet connection and try again.');
            }
            throw error;
        }
    },
    
    get(endpoint) { return this.request(endpoint, { method: 'GET' }); },
    post(endpoint, data) { return this.request(endpoint, { method: 'POST', body: JSON.stringify(data) }); },
    put(endpoint, data) { return this.request(endpoint, { method: 'PUT', body: JSON.stringify(data) }); },
    delete(endpoint) { return this.request(endpoint, { method: 'DELETE' }); }
};

// ============================================
// UI COMPONENTS
// ============================================
const Components = {
    Button({ text, onClick, variant = 'primary', type = 'button', disabled = false, className = '' }) {
        const variants = {
            primary: 'bg-blue-600 hover:bg-blue-700 text-white',
            secondary: 'bg-gray-200 hover:bg-gray-300 text-gray-800',
            danger: 'bg-red-600 hover:bg-red-700 text-white',
            success: 'bg-green-600 hover:bg-green-700 text-white',
            outline: 'border-2 border-blue-600 text-blue-600 hover:bg-blue-50'
        };
        return `<button type="${type}" onclick="${onClick}" ${disabled ? 'disabled' : ''} class="${variants[variant]} px-6 py-2 rounded-lg font-medium transition-all ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}">${disabled ? '<span class="spinner inline-block mr-2"></span>' : ''}${text}</button>`;
    },
    
    Input({ label, type = 'text', name, value = '', placeholder = '', required = false }) {
        return `<div class="mb-4"><label class="block text-sm font-medium text-gray-700 mb-1">${label}</label><input type="${type}" name="${name}" value="${value}" placeholder="${placeholder}" ${required ? 'required' : ''} class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></div>`;
    },
    
    Card({ title, children, className = '' }) {
        return `<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 ${className}">${title ? `<h3 class="text-lg font-semibold text-gray-800 mb-4">${title}</h3>` : ''}${children}</div>`;
    },
    
    Alert({ type = 'info', message }) {
        const styles = { info: 'bg-blue-50 border-blue-200 text-blue-800', success: 'bg-green-50 border-green-200 text-green-800', warning: 'bg-yellow-50 border-yellow-200 text-yellow-800', error: 'bg-red-50 border-red-200 text-red-800' };
        return `<div class="${styles[type]} border px-4 py-3 rounded-lg mb-4">${message}</div>`;
    }
};

// ============================================
// VIEWS
// ============================================
const Views = {
    Login() {
        const handleSubmit = async (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            if (!data.email || !data.password) {
                alert('Please enter both email and password');
                return;
            }
            
            try {
                store.loading = true;
                renderApp();
                
                console.log('Attempting login with:', data.email);
                const response = await api.post('/auth/login', data);
                
                console.log('Login response:', response);
                
                // FIXED: Validate response structure
                if (!response) {
                    throw new Error('No response from server');
                }
                
                if (!response.access_token) {
                    console.error('Invalid response structure:', response);
                    throw new Error('Invalid server response: missing access_token');
                }
                
                if (!response.user) {
                    throw new Error('Invalid server response: missing user data');
                }
                
                store.setToken(response.access_token);
                store.setUser(response.user);
                store.currentView = 'dashboard';
            } catch (error) {
                console.error('Login error:', error);
                alert(error.message || 'Login failed. Please try again.');
            } finally {
                store.loading = false;
                renderApp();
            }
        };
        
        window.handleLoginSubmit = handleSubmit;
        
        return `
            <div class="min-h-screen gradient-bg flex items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in">
                    <div class="text-center mb-8">
                        <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
                        <p class="text-gray-500">Sign in to your trading journal</p>
                    </div>
                    <form onsubmit="window.handleLoginSubmit(event)" method="POST" action="javascript:void(0);">
                        ${Components.Input({ label: 'Email', type: 'email', name: 'email', placeholder: 'you@example.com', required: true })}
                        ${Components.Input({ label: 'Password', type: 'password', name: 'password', placeholder: '••••••••', required: true })}
                        <div class="flex items-center justify-between mb-6">
                            <label class="flex items-center"><input type="checkbox" class="rounded border-gray-300 text-blue-600"><span class="ml-2 text-sm text-gray-600">Remember me</span></label>
                            <a href="#" class="text-sm text-blue-600 hover:text-blue-700">Forgot password?</a>
                        </div>
                        ${Components.Button({ text: 'Sign In', type: 'submit', variant: 'primary', className: 'w-full', disabled: store.loading })}
                    </form>
                    <div class="mt-6 text-center">
                        <p class="text-gray-600">Don't have an account? <a href="#" onclick="event.preventDefault(); store.currentView='register'; renderApp()" class="text-blue-600 hover:text-blue-700 font-medium">Sign up</a></p>
                    </div>
                </div>
            </div>`;
    },
    
    Register() {
        const handleSubmit = async (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password'),
                full_name: formData.get('full_name')
            };
            
            const confirmPassword = formData.get('confirmPassword');
            
            if (data.password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (data.password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }
            
            try {
                store.loading = true;
                renderApp();
                
                console.log('Attempting registration with:', data.email);
                const response = await api.post('/auth/register', data);
                
                console.log('Registration response:', response);
                
                // FIXED: Validate response structure
                if (!response) {
                    throw new Error('No response from server');
                }
                
                if (!response.access_token) {
                    console.error('Invalid response structure:', response);
                    throw new Error('Invalid server response: missing access_token');
                }
                
                if (!response.user) {
                    throw new Error('Invalid server response: missing user data');
                }
                
                store.setToken(response.access_token);
                store.setUser(response.user);
                store.currentView = 'dashboard';
            } catch (error) {
                console.error('Registration error:', error);
                alert(error.message || 'Registration failed. Please try again.');
            } finally {
                store.loading = false;
                renderApp();
            }
        };
        
        window.handleRegisterSubmit = handleSubmit;
        
        return `
            <div class="min-h-screen gradient-bg flex items-center justify-center p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 fade-in">
                    <div class="text-center mb-8">
                        <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
                        <p class="text-gray-500">Start your trading journey</p>
                    </div>
                    <form onsubmit="window.handleRegisterSubmit(event)" method="POST" action="javascript:void(0);">
                        ${Components.Input({ label: 'Full Name', name: 'full_name', placeholder: 'John Doe', required: true })}
                        ${Components.Input({ label: 'Email', type: 'email', name: 'email', placeholder: 'you@example.com', required: true })}
                        ${Components.Input({ label: 'Password', type: 'password', name: 'password', placeholder: '••••••••', required: true })}
                        ${Components.Input({ label: 'Confirm Password', type: 'password', name: 'confirmPassword', placeholder: '••••••••', required: true })}
                        ${Components.Button({ text: 'Create Account', type: 'submit', variant: 'primary', className: 'w-full', disabled: store.loading })}
                    </form>
                    <div class="mt-6 text-center">
                        <p class="text-gray-600">Already have an account? <a href="#" onclick="event.preventDefault(); store.currentView='login'; renderApp()" class="text-blue-600 hover:text-blue-700 font-medium">Sign in</a></p>
                    </div>
                </div>
            </div>`;
    },
    
    Dashboard() {
        let stats = null, recentTrades = [];
        
        const loadData = async () => {
            try {
                const [analytics, trades] = await Promise.all([
                    api.get('/analytics/dashboard'),
                    api.get('/trades?per_page=5')
                ]);
                stats = analytics?.overall || null;
                recentTrades = trades?.trades || [];
                renderApp();
            } catch (error) { 
                console.error('Failed to load dashboard:', error);
                if (error.message?.includes('401') || error.message?.includes('403') || error.message?.includes('Session expired')) {
                    store.logout();
                    renderApp();
                }
            }
        };
        
        if (!stats) { loadData(); }
        
        const StatCard = ({ title, value, change, icon, color }) => `
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 card-hover">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">${title}</p>
                        <p class="text-2xl font-bold text-gray-800">${value}</p>
                        ${change !== undefined ? `<p class="text-sm ${change >= 0 ? 'text-green-600' : 'text-red-600'}">${change >= 0 ? '+' : ''}${change}%</p>` : ''}
                    </div>
                    <div class="w-12 h-12 ${color} rounded-lg flex items-center justify-center">${icon}</div>
                </div>
            </div>`;
        
        return `
            <div class="fade-in">
                <div class="mb-8">
                    <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
                    <p class="text-gray-500">Welcome back, ${store.user?.full_name || 'Trader'}!</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    ${StatCard({ title: 'Total Trades', value: stats?.total_trades || 0, change: 12, color: 'bg-blue-100', icon: '<svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' })}
                    ${StatCard({ title: 'Win Rate', value: `${stats?.win_rate || 0}%`, change: 5, color: 'bg-green-100', icon: '<svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>' })}
                    ${StatCard({ title: 'Net P&L', value: `$${stats?.net_pnl?.toFixed(2) || '0.00'}`, change: stats?.net_pnl >= 0 ? 8 : -3, color: stats?.net_pnl >= 0 ? 'bg-green-100' : 'bg-red-100', icon: '<svg class="w-6 h-6 ' + (stats?.net_pnl >= 0 ? 'text-green-600' : 'text-red-600') + '" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' })}
                    ${StatCard({ title: 'Profit Factor', value: stats?.profit_factor?.toFixed(2) || '0.00', change: 2, color: 'bg-purple-100', icon: '<svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>' })}
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    ${Components.Card({
                        title: 'Recent Trades',
                        children: `
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="bg-gray-50"><tr><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Symbol</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Type</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">P&L</th><th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Date</th></tr></thead>
                                    <tbody class="divide-y divide-gray-200">
                                        ${recentTrades.length === 0 ? '<tr><td colspan="4" class="px-4 py-4 text-center text-gray-500">No trades yet</td></tr>' : recentTrades.map(trade => `<tr class="hover:bg-gray-50"><td class="px-4 py-3 font-medium">${trade.symbol}</td><td class="px-4 py-3"><span class="px-2 py-1 text-xs rounded-full ${trade.trade_type === 'BUY' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${trade.trade_type}</span></td><td class="px-4 py-3 ${trade.profit_loss >= 0 ? 'text-green-600' : 'text-red-600'}">${trade.profit_loss >= 0 ? '+' : ''}$${trade.profit_loss?.toFixed(2) || '0.00'}</td><td class="px-4 py-3 text-sm text-gray-500">${new Date(trade.entry_date).toLocaleDateString()}</td></tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                            <div class="mt-4"><button onclick="store.currentView='trades';renderApp()" class="text-blue-600 hover:text-blue-700 text-sm font-medium">View All Trades →</button></div>`
                    })}
                    ${Components.Card({
                        title: 'Quick Actions',
                        children: `
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="store.currentView='newTrade';renderApp()" class="p-4 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all text-center">
                                    <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    <span class="text-sm font-medium text-gray-700">Add Trade</span>
                                </button>
                                <button onclick="store.currentView='courses';renderApp()" class="p-4 border-2 border-dashed border-gray-300 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all text-center">
                                    <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                                    <span class="text-sm font-medium text-gray-700">Browse Courses</span>
                                </button>
                            </div>`
                    })}
                </div>
            </div>`;
    },
    
    Layout({ children }) {
        const menuItems = [
            { id: 'dashboard', label: 'Dashboard', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>' },
            { id: 'trades', label: 'Trades', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' },
            { id: 'analytics', label: 'Analytics', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"/></svg>' },
            { id: 'courses', label: 'Courses', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>' },
            { id: 'blog', label: 'Blog', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>' },
        ];
        
        if (store.isAdmin) {
            menuItems.push({ id: 'admin', label: 'Admin', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' });
        }
        
        window.handleLogout = () => { store.logout(); renderApp(); };
        
        return `
            <div class="min-h-screen bg-gray-50 flex">
                <aside class="w-64 bg-white border-r border-gray-200 fixed h-full z-10">
                    <div class="p-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                            </div>
                            <span class="text-xl font-bold text-gray-800">Pipways</span>
                        </div>
                    </div>
                    <nav class="px-4 pb-4">
                        ${menuItems.map(item => `<a href="#" onclick="event.preventDefault(); store.currentView='${item.id}';renderApp();" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 mb-1 ${store.currentView === item.id ? 'active bg-blue-50 text-blue-600' : ''}">${item.icon}<span class="font-medium">${item.label}</span></a>`).join('')}
                    </nav>
                    <div class="absolute bottom-0 left-0 right-0 p-4 border-t">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center">
                                <span class="text-gray-600 font-medium">${store.user?.full_name?.charAt(0) || 'U'}</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-gray-800 truncate">${store.user?.full_name || 'User'}</p>
                                <p class="text-xs text-gray-500 truncate">${store.user?.email || ''}</p>
                            </div>
                        </div>
                        <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                            Sign Out
                        </button>
                    </div>
                </aside>
                <main class="flex-1 ml-64 p-8">${children}</main>
            </div>`;
    }
};

// ============================================
// MAIN RENDER FUNCTION
// ============================================
function renderApp() {
    const app = document.getElementById('app');
    
    if (!store.token) {
        app.innerHTML = store.currentView === 'register' ? Views.Register() : Views.Login();
        return;
    }
    
    let content;
    switch (store.currentView) {
        case 'dashboard': content = Views.Dashboard(); break;
        case 'trades': content = `<div class="fade-in"><h1 class="text-2xl font-bold mb-6">Trades</h1><p>Trades view coming soon...</p></div>`; break;
        case 'analytics': content = `<div class="fade-in"><h1 class="text-2xl font-bold mb-6">Analytics</h1><p>Analytics view coming soon...</p></div>`; break;
        case 'courses': content = `<div class="fade-in"><h1 class="text-2xl font-bold mb-6">Courses</h1><p>Courses view coming soon...</p></div>`; break;
        case 'blog': content = `<div class="fade-in"><h1 class="text-2xl font-bold mb-6">Blog</h1><p>Blog view coming soon...</p></div>`; break;
        case 'admin': content = store.isAdmin ? `<div class="fade-in"><h1 class="text-2xl font-bold mb-6">Admin Dashboard</h1><p>Admin view coming soon...</p></div>` : Components.Alert({ type: 'error', message: 'Access denied. Admin only.' }); break;
        default: content = Views.Dashboard();
    }
    
    app.innerHTML = Views.Layout({ children: content });
}

// ============================================
// INITIALIZE
// ============================================
document.addEventListener('DOMContentLoaded', () => {
    console.log('Pipways app initializing...');
    console.log('API Base URL:', api.baseUrl);
    renderApp();
});
</script>
</body>
</html>
