<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Pipways - Forex Trading Journal & Educational Platform</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-strong { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); transition: all 0.2s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.2); border-right: 3px solid #3b82f6; }
        .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .live-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .notification-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; }
        .admin-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        @media (max-width: 1024px) { .hide-mobile { display: none !important; } }
        @media (min-width: 1025px) { .hide-desktop { display: none !important; } }
        
        /* New Styles for v3.0 */
        .password-strength { height: 4px; border-radius: 2px; transition: all 0.3s ease; }
        .password-strength.weak { background: #ef4444; width: 33%; }
        .password-strength.fair { background: #f59e0b; width: 66%; }
        .password-strength.strong { background: #10b981; width: 100%; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .drag-over { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
        .seo-score-excellent { color: #10b981; }
        .seo-score-good { color: #f59e0b; }
        .seo-score-poor { color: #ef4444; }
        .rich-editor-toolbar { display: flex; gap: 4px; padding: 8px; background: #1e293b; border-radius: 8px 8px 0 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .rich-editor-btn { padding: 6px 10px; border-radius: 4px; background: transparent; color: #94a3b8; cursor: pointer; transition: all 0.2s; }
        .rich-editor-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .rich-editor-content { min-height: 300px; padding: 16px; background: #0f172a; border-radius: 0 0 8px 8px; outline: none; }
        .module-item { border-left: 3px solid transparent; transition: all 0.2s; }
        .module-item:hover { border-left-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .lesson-item { padding-left: 24px; position: relative; }
        .lesson-item::before { content: ''; position: absolute; left: 8px; top: 50%; width: 8px; height: 8px; background: #475569; border-radius: 50%; transform: translateY(-50%); }
        .lesson-item.completed::before { background: #10b981; }
        .lesson-item.active::before { background: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
    </style>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const API_URL = (() => {
            const hostname = window.location.hostname;
            console.log('Detected hostname:', hostname);
            
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return 'http://localhost:8000';
            }
            
            if (hostname.includes('render.com')) {
                const apiHostname = hostname.replace('-web-', '-api-');
                console.log('Inferred API hostname:', apiHostname);
                return `https://${apiHostname}`;
            }
            
            return 'https://pipways-api.onrender.com';
        })();
        
        console.log('API URL:', API_URL);
        
        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let authToken = localStorage.getItem('pipways_token');
        let currentUser = null;
        let currentPage = 'dashboard';
        let notificationInterval = null;
        let appConfig = {
            features: {
                aiAnalysis: true,
                courses: true,
                webinars: true,
                blog: true,
                subscriptions: true
            }
        };

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { 
                success: 'bg-green-500', 
                error: 'bg-red-500', 
                info: 'bg-blue-500', 
                warning: 'bg-yellow-500' 
            };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg animate-fade-in flex items-center gap-2`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : type === 'warning' ? 'alert-triangle' : 'info'}" class="w-5 h-5"></i>
                <span>${message}</span>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => toast.remove(), duration);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric' 
            });
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return 'N/A';
            return new Date(dateStr).toLocaleString('en-US', { 
                month: 'short', 
                day: 'numeric', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { 
                style: 'currency', 
                currency: 'USD' 
            }).format(amount);
        }

        function generateSlug(title) {
            return title.toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
        }

        function truncateText(text, maxLength = 100) {
            if (!text || text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('Copied to clipboard!', 'success');
            } catch (err) {
                showToast('Failed to copy', 'error');
            }
        }

        // ==========================================
        // API CLIENT
        // ==========================================
        async function apiCall(endpoint, options = {}) {
            const url = `${API_URL}${endpoint}`;
            const config = {
                headers: { 
                    'Authorization': `Bearer ${authToken}`, 
                    'Content-Type': 'application/json',
                    ...options.headers 
                },
                ...options
            };
            
            try {
                const response = await fetch(url, config);
                
                if (response.status === 401) { 
                    logout(); 
                    throw new Error('Session expired. Please log in again.'); 
                }
                
                if (response.status === 403) {
                    throw new Error('You do not have permission to perform this action.');
                }
                
                if (response.status === 429) {
                    throw new Error('Rate limit exceeded. Please try again later.');
                }
                
                return response;
            } catch (error) {
                console.error('API Call Error:', error);
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    throw new Error('Cannot connect to server. Please check your internet connection.');
                }
                throw error;
            }
        }

        // ==========================================
        // MODAL SYSTEM
        // ==========================================
        function showModal(content, options = {}) {
            const container = document.getElementById('modal-container');
            const sizeClass = options.size === 'lg' ? 'max-w-4xl' : options.size === 'xl' ? 'max-w-6xl' : 'max-w-2xl';
            
            container.innerHTML = `
                <div class="${sizeClass} w-full glass rounded-2xl p-6 max-h-[90vh] overflow-y-auto">
                    ${options.title ? `<h2 class="text-xl font-bold mb-4">${options.title}</h2>` : ''}
                    ${content}
                </div>
            `;
            container.classList.remove('hidden');
            lucide.createIcons();
        }

        function hideModal() {
            document.getElementById('modal-container').classList.add('hidden');
        }

        function showConfirm(title, message, onConfirm, onCancel = null) {
            const content = `
                <p class="text-slate-300 mb-6">${message}</p>
                <div class="flex justify-end gap-3">
                    <button onclick="hideModal()" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-colors">Cancel</button>
                    <button id="confirm-btn" class="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 transition-colors">Confirm</button>
                </div>
            `;
            showModal(content, { title });
            
            document.getElementById('confirm-btn').onclick = () => {
                hideModal();
                onConfirm();
            };
        }

        // ==========================================
        // FILE UPLOAD COMPONENT
        // ==========================================
        function createFileUploader(options = {}) {
            const {
                accept = '*',
                multiple = false,
                maxSize = 10 * 1024 * 1024, // 10MB
                onUpload,
                preview = true
            } = options;

            const container = document.createElement('div');
            container.className = 'file-uploader';
            
            container.innerHTML = `
                <div class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:border-blue-500 transition-colors cursor-pointer" id="drop-zone">
                    <i data-lucide="upload-cloud" class="w-12 h-12 mx-auto mb-4 text-slate-400"></i>
                    <p class="text-slate-300 mb-2">Drag & drop files here or click to browse</p>
                    <p class="text-slate-500 text-sm">Maximum file size: ${(maxSize / 1024 / 1024).toFixed(1)}MB</p>
                    <input type="file" id="file-input" class="hidden" accept="${accept}" ${multiple ? 'multiple' : ''}>
                </div>
                <div id="upload-preview" class="mt-4 space-y-2"></div>
            `;

            const dropZone = container.querySelector('#drop-zone');
            const fileInput = container.querySelector('#file-input');
            const previewContainer = container.querySelector('#upload-preview');

            dropZone.addEventListener('click', () => fileInput.click());
            
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFiles(e.dataTransfer.files);
            });

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });

            function handleFiles(files) {
                Array.from(files).forEach(file => {
                    if (file.size > maxSize) {
                        showToast(`File ${file.name} is too large`, 'error');
                        return;
                    }
                    
                    if (preview) {
                        showFilePreview(file);
                    }
                    
                    if (onUpload) {
                        onUpload(file);
                    }
                });
            }

            function showFilePreview(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const isImage = file.type.startsWith('image/');
                    const isVideo = file.type.startsWith('video/');
                    
                    const previewItem = document.createElement('div');
                    previewItem.className = 'flex items-center gap-3 p-3 bg-slate-800/50 rounded-lg';
                    previewItem.innerHTML = `
                        ${isImage ? `<img src="${e.target.result}" class="w-12 h-12 object-cover rounded">` : 
                          isVideo ? `<div class="w-12 h-12 bg-slate-700 rounded flex items-center justify-center"><i data-lucide="video" class="w-6 h-6"></i></div>` :
                          `<div class="w-12 h-12 bg-slate-700 rounded flex items-center justify-center"><i data-lucide="file" class="w-6 h-6"></i></div>`}
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium truncate">${file.name}</p>
                            <p class="text-xs text-slate-500">${(file.size / 1024).toFixed(1)} KB</p>
                        </div>
                        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-red-400">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    `;
                    previewContainer.appendChild(previewItem);
                    lucide.createIcons();
                };
                
                if (file.type.startsWith('image/')) {
                    reader.readAsDataURL(file);
                } else {
                    reader.readAsText(file);
                }
            }

            return container;
        }

        // ==========================================
        // RICH TEXT EDITOR
        // ==========================================
        function createRichEditor(containerId, options = {}) {
            const container = document.getElementById(containerId);
            if (!container) return null;

            const { placeholder = 'Start writing...', height = '300px' } = options;

            container.innerHTML = `
                <div class="rich-editor-toolbar">
                    <button type="button" class="rich-editor-btn" data-command="formatBlock" data-value="H1">H1</button>
                    <button type="button" class="rich-editor-btn" data-command="formatBlock" data-value="H2">H2</button>

        // ==========================================
        // TAG INPUT COMPONENT
        // ==========================================
        function createTagInput(containerId, options = {}) {
            const container = document.getElementById(containerId);
            if (!container) return null;

            const { 
                placeholder = 'Add tags...', 
                maxTags = 10, 
                suggestions = [],
                allowNew = true 
            } = options;

            let tags = [];

            container.innerHTML = `
                <div class="flex flex-wrap gap-2 p-3 bg-slate-800 border border-slate-700 rounded-lg min-h-[48px]">
                    <div id="tags-container" class="flex flex-wrap gap-2"></div>
                    <input type="text" id="tag-input" class="flex-1 min-w-[120px] bg-transparent outline-none text-sm" placeholder="${placeholder}">
                </div>
                <div id="tag-suggestions" class="hidden mt-2 p-2 bg-slate-800 border border-slate-700 rounded-lg max-h-40 overflow-y-auto"></div>
            `;

            const tagsContainer = container.querySelector('#tags-container');
            const input = container.querySelector('#tag-input');
            const suggestionsContainer = container.querySelector('#tag-suggestions');

            function renderTags() {
                tagsContainer.innerHTML = tags.map(tag => `
                    <span class="inline-flex items-center gap-1 px-2 py-1 bg-blue-500/20 text-blue-400 text-sm rounded">
                        ${tag}
                        <button type="button" class="tag-remove hover:text-red-400" data-tag="${tag}">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    </span>
                `).join('');
                lucide.createIcons();
            }

            function addTag(tag) {
                tag = tag.trim().toLowerCase();
                if (!tag || tags.includes(tag)) return;
                if (tags.length >= maxTags) {
                    showToast(`Maximum ${maxTags} tags allowed`, 'warning');
                    return;
                }
                tags.push(tag);
                renderTags();
                input.value = '';
                suggestionsContainer.classList.add('hidden');
            }

            function removeTag(tag) {
                tags = tags.filter(t => t !== tag);
                renderTags();
            }

            function showSuggestions(query) {
                if (!query || suggestions.length === 0) {
                    suggestionsContainer.classList.add('hidden');
                    return;
                }

                const filtered = suggestions.filter(s => 
                    s.toLowerCase().includes(query.toLowerCase()) && 
                    !tags.includes(s.toLowerCase())
                );

                if (filtered.length === 0) {
                    suggestionsContainer.classList.add('hidden');
                    return;
                }

                suggestionsContainer.innerHTML = filtered.map(s => `
                    <div class="tag-suggestion px-3 py-2 hover:bg-slate-700 cursor-pointer rounded text-sm" data-tag="${s}">
                        ${s}
                    </div>
                `).join('');
                suggestionsContainer.classList.remove('hidden');
            }

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    addTag(input.value);
                } else if (e.key === 'Backspace' && !input.value && tags.length > 0) {
                    removeTag(tags[tags.length - 1]);
                }
            });

            input.addEventListener('input', (e) => {
                showSuggestions(e.target.value);
            });

            container.addEventListener('click', (e) => {
                if (e.target.classList.contains('tag-remove') || e.target.closest('.tag-remove')) {
                    const tag = e.target.closest('.tag-remove').dataset.tag;
                    removeTag(tag);
                }
                if (e.target.classList.contains('tag-suggestion')) {
                    addTag(e.target.dataset.tag);
                }
            });

            document.addEventListener('click', (e) => {
                if (!container.contains(e.target)) {
                    suggestionsContainer.classList.add('hidden');
                }
            });

            return {
                getTags: () => [...tags],
                setTags: (newTags) => {
                    tags = [...newTags];
                    renderTags();
                },
                clear: () => {
                    tags = [];
                    renderTags();
                },
                addTag,
                removeTag
            };
        }

        // ==========================================
        // FORM VALIDATOR
        // ==========================================
        function createFormValidator(formId, rules = {}) {
            const form = document.getElementById(formId);
            if (!form) return null;

            const errors = {};

            function validateField(field, rule) {
                const value = field.value.trim();
                const fieldErrors = [];

                if (rule.required && !value) {
                    fieldErrors.push('This field is required');
                }

                if (rule.minLength && value.length < rule.minLength) {
                    fieldErrors.push(`Minimum ${rule.minLength} characters required`);
                }

                if (rule.maxLength && value.length > rule.maxLength) {
                    fieldErrors.push(`Maximum ${rule.maxLength} characters allowed`);
                }

                if (rule.pattern && !rule.pattern.test(value)) {
                    fieldErrors.push(rule.patternMessage || 'Invalid format');
                }

                if (rule.match) {
                    const matchField = form.querySelector(`[name="${rule.match}"]`);
                    if (matchField && value !== matchField.value) {
                        fieldErrors.push('Fields do not match');
                    }
                }

                if (rule.custom) {
                    const customError = rule.custom(value);
                    if (customError) {
                        fieldErrors.push(customError);
                    }
                }

                errors[field.name] = fieldErrors;
                showFieldErrors(field, fieldErrors);
                return fieldErrors.length === 0;
            }

            function showFieldErrors(field, fieldErrors) {
                const container = field.closest('.form-field') || field.parentElement;
                let errorEl = container.querySelector('.field-error');
                
                if (fieldErrors.length > 0) {
                    field.classList.add('border-red-500');
                    field.classList.remove('border-green-500');
                    
                    if (!errorEl) {
                        errorEl = document.createElement('p');
                        errorEl.className = 'field-error text-red-400 text-xs mt-1';
                        container.appendChild(errorEl);
                    }
                    errorEl.textContent = fieldErrors[0];
                } else {
                    field.classList.remove('border-red-500');
                    field.classList.add('border-green-500');
                    if (errorEl) {
                        errorEl.remove();
                    }
                }
            }

            // Real-time validation
            Object.keys(rules).forEach(fieldName => {
                const field = form.querySelector(`[name="${fieldName}"]`);
                if (field) {
                    field.addEventListener('blur', () => validateField(field, rules[fieldName]));
                    field.addEventListener('input', debounce(() => {
                        if (errors[fieldName]) {
                            validateField(field, rules[fieldName]);
                        }
                    }, 300));
                }
            });

            return {
                validate: () => {
                    let isValid = true;
                    Object.keys(rules).forEach(fieldName => {
                        const field = form.querySelector(`[name="${fieldName}"]`);
                        if (field) {
                            if (!validateField(field, rules[fieldName])) {
                                isValid = false;
                            }
                        }
                    });
                    return isValid;
                },
                getErrors: () => ({ ...errors }),
                clearErrors: () => {
                    Object.keys(errors).forEach(key => delete errors[key]);
                    form.querySelectorAll('.field-error').forEach(el => el.remove());
                    form.querySelectorAll('.border-red-500, .border-green-500').forEach(el => {
                        el.classList.remove('border-red-500', 'border-green-500');
                    });
                }
            };
        }

        function calculatePasswordStrength(password) {
            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            if (score >= 5) return 'strong';
            if (score >= 3) return 'fair';
            return 'weak';
        }

        async function handleModernLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('email', e.target.email.value);
                formData.append('password', e.target.password.value);

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'Login failed');

                authToken = data.access_token;
                currentUser = data;
                localStorage.setItem('pipways_token', authToken);
                showApp();
                showToast('Welcome back!', 'success');
            } catch (error) {
                console.error('Login error:', error);
                showToast(error.message, 'error');
                e.target.classList.add('shake');
                setTimeout(() => e.target.classList.remove('shake'), 500);
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        async function handleModernRegister(e) {
            e.preventDefault();
            
            // Validate passwords match
            const password = e.target.password.value;
            const confirmPassword = e.target.confirm_password.value;
            
            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            const btn = document.getElementById('register-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('name', e.target.name.value);

        function logout() {
            // Call logout endpoint to invalidate token
            if (authToken) {
                fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                }).catch(() => {}); // Ignore errors
            }
            
            authToken = null;
            currentUser = null;
            localStorage.removeItem('pipways_token');
            if (notificationInterval) clearInterval(notificationInterval);
            
            document.getElementById('main-app').classList.add('hidden');
            initializeModernLogin();
        }

            document.getElementById('auth-container').innerHTML = '';

            try {
                const response = await apiCall('/auth/me');
                currentUser = await response.json();
                console.log('Current user:', currentUser);
                
                // Check if user is admin
                const isAdmin = currentUser.role === 'admin' || currentUser.is_admin === true;
                
                if (isAdmin) {

        function updateNotificationBadge(count) {
            const sidebarBadge = document.getElementById('sidebar-notification-badge');

            if (count > 0) {
                sidebarBadge.textContent = count > 99 ? '99+' : count;
                sidebarBadge.classList.remove('hidden');
                mobileBadge.textContent = count > 99 ? '99+' : count;
                mobileBadge.classList.remove('hidden');

                mobileBadge.classList.add('hidden');

        async function loadTradesList() {
            const container = document.getElementById('trades-list');
            if (!container) return;
            
            try {
                const response = await apiCall('/trades');
                const trades = await response.json();
                
                container.innerHTML = `
                    <div class="glass rounded-xl p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-lg font-semibold">Trade History</h2>
                            <button onclick="exportTrades()" class="text-blue-400 hover:text-blue-300 text-sm flex items-center gap-1">
                                <i data-lucide="download" class="w-4 h-4"></i>
                                Export CSV
                            </button>
                        </div>
                        ${trades.length > 0 ? `
                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="text-slate-400 text-sm">
                                        <tr>
                                            <th class="text-left py-2">Date</th>
                                            <th class="text-left">Pair</th>
                                            <th class="text-left">Direction</th>
                                            <th class="text-left">Grade</th>
                                            <th class="text-right">Pips</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${trades.map(t => `
                                            <tr class="border-t border-white/5 hover:bg-white/5 transition-colors">
                                                <td class="py-3">${formatDate(t.created_at)}</td>
                                                <td class="font-semibold">${t.pair}</td>
                                                <td>
                                                    <span class="px-2 py-1 rounded text-xs ${t.direction === 'LONG' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${t.direction}</span>
                                                </td>
                                                <td>
                                                    <span class="px-2 py-1 rounded text-xs bg-slate-700">${t.grade}</span>
                                                </td>
                                                <td class="text-right font-mono ${t.pips >= 0 ? 'text-green-400' : 'text-red-400'}">${t.pips > 0 ? '+' : ''}${t.pips}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : '<p class="text-slate-500 text-center py-8">No trades yet. Start by logging your first trade above!</p>'}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="text-red-400">${error.message}</div>`;
            }
            lucide.createIcons();
        }

        async function handleTradeSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2 border-white border-t-transparent rounded-full"></div>';
            btn.disabled = true;

            try {
                const formData = new FormData(e.target);
                const response = await apiCall('/trades', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                    body: new URLSearchParams(formData) 
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to save trade');
                }
                
                showToast('Trade saved successfully!', 'success');
                e.target.reset();
                loadTradesList();
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function exportTrades() {
            try {
                const response = await apiCall('/trades/export?format=csv');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `trades_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showToast('Trades exported successfully!', 'success');
            } catch (error) {
                showToast('Failed to export trades', 'error');
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is already logged in
            if (authToken) {
                try {
                    const response = await fetch(`${API_URL}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    
                    if (response.ok) {
                        currentUser = await response.json();
                        showApp();
                    } else {
                        // Token invalid, clear it
                        localStorage.removeItem('pipways_token');
                        authToken = null;
                        initializeModernLogin();
                    }
                } catch (error) {
                    console.error('Auth check failed:', error);
                    initializeModernLogin();
                }
            } else {
                // Check URL for admin login
                if (window.location.pathname === '/admin-login') {
                    initializeAdminLogin();
                } else {
                    initializeModernLogin();
                }
            }
        });

        // Handle browser back/forward buttons
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.page) {
                navigateTo(e.state.page);
            }
        });
