<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Institutional Trader Development</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            color: #60a5fa;
        }
        
        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .hidden { display: none !important; }
        
        /* Checklist styles */
        .checklist-item {
            transition: all 0.2s ease;
        }
        
        .checklist-item:hover {
            background: rgba(59, 130, 246, 0.05);
        }
        
        .checklist-item.checked {
            opacity: 0.7;
        }
        
        .checklist-item.checked .check-text {
            text-decoration: line-through;
            color: #64748b;
        }
        
        /* Progress ring */
        .progress-ring {
            transform: rotate(-90deg);
        }
        
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
        }
        
        /* Blog styles */
        .blog-card {
            transition: all 0.3s ease;
        }
        
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased">

<script>
const API_URL = 'https://pipways-api-nhem.onrender.com';
let authToken = localStorage.getItem('pipways_token');
let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');
let checklistData = {};

if (authToken) {
    showApp();
} else {
    showAuth();
}

function showAuth() {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}

function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    
    // Show admin menu if user is admin
    if (currentUser.is_admin) {
        document.getElementById('admin-menu-item').classList.remove('hidden');
    }
    
    showPage('dashboard');
}

function showAuthTab(tab) {
    const loginBtn = document.getElementById('tab-login');
    const registerBtn = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    if (tab === 'login') {
        loginBtn.classList.add('bg-blue-500', 'text-white');
        loginBtn.classList.remove('text-slate-400');
        registerBtn.classList.remove('bg-blue-500', 'text-white');
        registerBtn.classList.add('text-slate-400');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        registerBtn.classList.add('bg-blue-500', 'text-white');
        registerBtn.classList.remove('text-slate-400');
        loginBtn.classList.remove('bg-blue-500', 'text-white');
        loginBtn.classList.add('text-slate-400');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
    document.getElementById('auth-error').classList.add('hidden');
}

function getErrorMessage(data) {
    if (typeof data === 'string') return data;
    if (data.detail) {
        if (typeof data.detail === 'string') return data.detail;
        if (Array.isArray(data.detail)) {
            return data.detail.map(err => {
                if (typeof err === 'string') return err;
                if (err.msg) return err.msg;
                if (err.message) return err.message;
                return JSON.stringify(err);
            }).join(', ');
        }
        return JSON.stringify(data.detail);
    }
    if (data.message) return data.message;
    if (data.error) return data.error;
    return JSON.stringify(data);
}

async function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        formData.append('name', form.name.value);
        
        const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

function logout() {
    localStorage.removeItem('pipways_token');
    localStorage.removeItem('pipways_user');
    authToken = null;
    currentUser = {};
    showAuth();
}

async function apiCall(endpoint, options = {}) {
    const headers = {
        'Authorization': `Bearer ${authToken}`,
        ...options.headers
    };
    
    const response = await fetch(`${API_URL}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Session expired. Please login again.');
    }
    
    return response;
}

async function showPage(page) {
    const content = document.getElementById('content');
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    if (event && event.target) {
        event.target.closest('.nav-btn').classList.add('active');
    } else {
        document.querySelector(`[onclick="showPage('${page}')"]`)?.classList.add('active');
    }

    if (page === 'dashboard') {
        await renderDashboard(content);
    } else if (page === 'analytics') {
        await renderAnalytics(content);
    } else if (page === 'journal') {
        await renderJournal(content);
    } else if (page === 'analysis') {
        renderChartAnalysis(content);
    } else if (page === 'discipline') {
        renderDiscipline(content);
    } else if (page === 'mentor') {
        renderMentor(content);
    } else if (page === 'blog') {
        await renderBlog(content);
    } else if (page === 'admin') {
        await renderAdmin(content);
    }
    lucide.createIcons();
}

// Dashboard
async function renderDashboard(content) {
    try {
        const response = await apiCall('/trades');
        const trades = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(trades));
        }
        
        const totalPips = trades.reduce((a, b) => a + (b.pips || 0), 0);
        const wins = trades.filter(t => t.pips > 0).length;
        const winRate = trades.length ? (wins / trades.length * 100).toFixed(0) : 0;
        
        content.innerHTML = `
            <div class="p-8 max-w-7xl mx-auto">
                <div class="flex items-center justify-between mb-8">
                    <div>

                        <p class="text-slate-400">Welcome back, ${currentUser.name || 'Trader'}</p>
                    </div>
                    <button onclick="showPage('journal')" class="btn-primary px-6 py-2.5 rounded-lg text-white font-medium flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> New Trade
                    </button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                <i data-lucide="shield" class="w-6 h-6 text-blue-400"></i>
                            </div>
                            <span class="text-xs font-medium text-emerald-400 flex items-center gap-1">
                                <i data-lucide="trending-up" class="w-3 h-3"></i> +12%
                            </span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Discipline Score</div>
                        <div class="text-3xl font-bold text-white">87<span class="text-lg text-slate-500">/100</span></div>
                    </div>
                    
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg bg-violet-500/20 flex items-center justify-center">
                                <i data-lucide="target" class="w-6 h-6 text-violet-400"></i>
                            </div>
                            <span class="text-xs font-medium text-slate-500">All time</span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Win Rate</div>
                        <div class="text-3xl font-bold text-white">${winRate}<span class="text-lg text-slate-500">%</span></div>
                    </div>
                    
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg ${totalPips >= 0 ? 'bg-emerald-500/20' : 'bg-red-500/20'} flex items-center justify-center">
                                <i data-lucide="activity" class="w-6 h-6 ${totalPips >= 0 ? 'text-emerald-400' : 'text-red-400'}"></i>
                            </div>
                            <span class="text-xs font-medium text-slate-500">Total</span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Total Pips</div>
                        <div class="text-3xl font-bold ${totalPips >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                            ${totalPips > 0 ? '+' : ''}${totalPips}
                        </div>
                    </div>
                    
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg bg-orange-500/20 flex items-center justify-center">
                                <i data-lucide="bar-chart-2" class="w-6 h-6 text-orange-400"></i>
                            </div>
                            <span class="text-xs font-medium text-slate-500">This month</span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Total Trades</div>
                        <div class="text-3xl font-bold text-white">${trades.length}</div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass rounded-xl p-6">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-semibold text-white">Recent Trades</h3>
                            <button onclick="showPage('journal')" class="text-sm text-blue-400 hover:text-blue-300 font-medium">View All</button>
                        </div>
                        <div class="space-y-3">
                            ${trades.slice(0, 5).map(t => `
                                <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg border border-slate-700/50 hover:border-slate-600 transition-colors">
                                    <div class="flex items-center gap-4">
                                        <div class="text-center min-w-[60px]">
                                            <div class="text-xs text-slate-500">${new Date(t.created_at).toLocaleDateString('en-US', {month: 'short', day: 'numeric'})}</div>
                                            <div class="text-xs text-slate-600">${new Date(t.created_at).getFullYear()}</div>
                                        </div>
                                        <div class="w-px h-8 bg-slate-700"></div>

function initChecklistHandlers() {
    const checkboxes = document.querySelectorAll('.checklist-checkbox');
    const progressCircle = document.getElementById('progress-circle');
    const progressText = document.getElementById('progress-text');
    
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const parent = this.closest('.checklist-item');
            if (this.checked) {
                parent.classList.add('checked');
            } else {
                parent.classList.remove('checked');
            }
            updateProgress();
        });
    });
    
    function updateProgress() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('.checklist-checkbox:checked').length;
        const percentage = Math.round((checked / total) * 100);
        
        const circumference = 2 * Math.PI * 28;
        const offset = circumference - (percentage / 100) * circumference;
        
        progressCircle.style.strokeDashoffset = offset;
        progressText.textContent = `${percentage}%`;
        
        // Store checklist data
        checklistData = {
            completed: checked,
            total: total,
            items: Array.from(checkboxes).map(cb => ({
                id: cb.dataset.id,
                checked: cb.checked,
                required: cb.dataset.required === 'true'
            }))
        };
    }
    
    updateProgress();
}

async function addTrade(e) {
    e.preventDefault();
    const f = e.target;
    const btn = document.getElementById('submit-trade-btn');
    const warningEl = document.getElementById('checklist-warning');
    
    // Validate checklist
    const requiredCheckboxes = document.querySelectorAll('.checklist-checkbox[data-required="true"]');
    const allRequiredChecked = Array.from(requiredCheckboxes).every(cb => cb.checked);
    
    if (!allRequiredChecked) {
        warningEl.classList.remove('hidden');
        warningEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
    }
    
    warningEl.classList.add('hidden');
    const originalText = btn.innerHTML;
    
    btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2"></div> Saving...';
    btn.disabled = true;
    
    try {
        const formData = new URLSearchParams();
        formData.append('pair', f.pair.value.toUpperCase());
        formData.append('direction', f.direction.value);
        formData.append('pips', f.pips.value);
        formData.append('grade', f.grade.value);
        formData.append('checklist_completed', 'true');
        formData.append('checklist_data', JSON.stringify(checklistData));
        if (f.entry_price.value) formData.append('entry_price', f.entry_price.value);
        if (f.exit_price.value) formData.append('exit_price', f.exit_price.value);
        
        const response = await apiCall('/trades', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Saved!';
        btn.classList.remove('bg-emerald-500');
        btn.classList.add('bg-emerald-600');
        
        setTimeout(() => {
            showPage('dashboard');
        }, 1000);
        
    } catch (err) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        alert('Error: ' + err.message);
    }
}

async function analyzeChart(input) {
    const file = input.files[0];

    const loadingDiv = document.getElementById('analysisLoading');
    const resultDiv = document.getElementById('analysisResult');
    
    loadingDiv.classList.remove('hidden');
    resultDiv.classList.add('hidden');
    
    try {
        const formData = new FormData();
        formData.append('file', file);
        
        const response = await apiCall('/analyze-chart', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        loadingDiv.classList.add('hidden');
        resultDiv.classList.remove('hidden');

function saveAnalysisToJournal(pair, direction, grade) {
    showPage('journal');
    setTimeout(() => {
        const pairInput = document.querySelector('input[name="pair"]');
        const directionSelect = document.querySelector('select[name="direction"]');
        const gradeSelect = document.querySelector('select[name="grade"]');
        
        if (pairInput) pairInput.value = pair;
        if (directionSelect) directionSelect.value = direction;
        if (gradeSelect) gradeSelect.value = grade;
        
        alert(`Analysis for ${pair} ${direction} (Grade ${grade}) loaded into journal form!`);
    }, 500);
}

async function askMentor() {
    const input = document.getElementById('mentorInput');
    const message = input.value.trim();
    if (!message) return;
    
    const chat = document.getElementById('chatHistory');
    
    // Add user message
    chat.innerHTML += `
        <div class="flex gap-3 flex-row-reverse">
            <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0">
                <i data-lucide="user" class="w-5 h-5 text-slate-300"></i>
            </div>
            <div class="bg-blue-600 rounded-2xl rounded-tr-sm px-5 py-3 max-w-[80%]">
                <p class="text-white text-sm leading-relaxed">${message}</p>
            </div>
        </div>
    `;
    
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    lucide.createIcons();
    
    // Show typing indicator
    const typingId = 'typing-' + Date.now();
    chat.innerHTML += `
        <div id="${typingId}" class="flex gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                <i data-lucide="bot" class="w-5 h-5 text-white"></i>
            </div>
            <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-5 py-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </div>
    `;
    chat.scrollTop = chat.scrollHeight;
    
    try {
        const response = await apiCall(`/mentor-chat?message=${encodeURIComponent(message)}`);
        const data = await response.json();
        
        // Remove typing indicator
        document.getElementById(typingId).remove();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        chat.innerHTML += `
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                </div>
                <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%]">
                    <p class="text-slate-200 text-sm leading-relaxed">${data.response}</p>
                    ${data.fallback ? '<span class="text-xs text-slate-600 mt-2 block">Offline mode</span>' : ''}
                </div>
            </div>
        `;
        
    } catch (err) {
        document.getElementById(typingId).remove();
        chat.innerHTML += `
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
                </div>
                <div class="bg-red-500/10 border border-red-500/20 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%]">
                    <p class="text-red-400 text-sm">Sorry, I'm having trouble connecting. Please try again.</p>
                </div>
            </div>
        `;
    }
    
    lucide.createIcons();
    chat.scrollTop = chat.scrollHeight;
}

                    <div class="glass rounded-xl p-6">
                        <div class="text-slate-400 text-sm mb-1">Total Views</div>
                        <div class="text-3xl font-bold text-white">${stats.blog_posts.total_views || 0}</div>
                    </div>
                </div>
                
                <!-- Blog Management -->
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-semibold text-white">Blog Management</h3>
                        <button onclick="showNewPostForm()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 rounded-lg text-white text-sm font-medium flex items-center gap-2">
                            <i data-lucide="plus" class="w-4 h-4"></i> New Post
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-700">
                                    <th class="text-left py-3">Title</th>
                                    <th class="text-left py-3">Category</th>
                                    <th class="text-center py-3">Status</th>
                                    <th class="text-center py-3">Views</th>
                                    <th class="text-right py-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${posts.map(post => `
                                    <tr class="border-b border-slate-800/50 hover:bg-slate-800/30">
                                        <td class="py-3">
                                            <div class="font-medium text-white">${post.title}</div>
                                            <div class="text-xs text-slate-500">/${post.slug}</div>
                                        </td>
                                        <td class="py-3 text-slate-400">${post.category || '-'}</td>
                                        <td class="py-3 text-center">
                                            <span class="px-2 py-1 rounded text-xs ${post.published ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-400'}">
                                                ${post.published ? 'Published' : 'Draft'}
                                            </span>
                                        </td>
                                        <td class="py-3 text-center text-slate-400">${post.view_count || 0}</td>
                                        <td class="py-3 text-right">
                                            <button onclick="deletePost(${post.id})" class="text-red-400 hover:text-red-300 transition-colors">
                                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('') || '<tr><td colspan="5" class="py-4 text-center text-slate-500">No posts yet</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- New Post Form (Hidden by default) -->
                <div id="new-post-form" class="hidden glass rounded-xl p-6 mt-6">
                    <h3 class="text-lg font-semibold text-white mb-4">Create New Post</h3>
                    <form onsubmit="createBlogPost(event)" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Title</label>
                                <input name="title" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Slug (URL)</label>
                                <input name="slug" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none" placeholder="my-post-title">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Category</label>
                                <input name="category" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none" placeholder="Strategy">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Tags (comma separated)</label>
                                <input name="tags" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none" placeholder="forex, psychology, risk">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Content</label>
                            <textarea name="content" required rows="6" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none"></textarea>
                        </div>
                        <div class="flex items-center gap-3">
                            <input type="checkbox" name="published" id="publish-check" class="w-5 h-5 rounded border-slate-600 bg-slate-800 text-blue-500">
                            <label for="publish-check" class="text-sm text-slate-300">Publish immediately</label>
                        </div>
                        <div class="flex gap-3">
                            <button type="submit" class="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 rounded-lg text-white font-medium">Create Post</button>
                            <button type="button" onclick="document.getElementById('new-post-form').classList.add('hidden')" class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 font-medium">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = `<div class="p-8"><div class="p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400">${err.message}</div></div>`;
    }
}

function showNewPostForm() {
    document.getElementById('new-post-form').classList.remove('hidden');
    document.getElementById('new-post-form').scrollIntoView({ behavior: 'smooth' });
}

async function createBlogPost(e) {
    e.preventDefault();
    const f = e.target;
    const btn = f.querySelector('button[type="submit"]');
    const originalText = btn.textContent;
    
    btn.textContent = 'Creating...';
    btn.disabled = true;
    
    try {
        const formData = new URLSearchParams();
        formData.append('title', f.title.value);
        formData.append('slug', f.slug.value);
        formData.append('content', f.content.value);
        formData.append('category', f.category.value);
        formData.append('tags', f.tags.value);
        formData.append('published', f.published.checked);
        
        const response = await apiCall('/admin/blog/posts', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        alert('Blog post created successfully!');
        renderAdmin(document.getElementById('content'));
        
    } catch (err) {
        alert('Error: ' + err.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

async function deletePost(postId) {
    if (!confirm('Are you sure you want to delete this post?')) return;
    
    try {
        const response = await apiCall(`/admin/blog/posts/${postId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            renderAdmin(document.getElementById('content'));
        } else {
            throw new Error('Failed to delete');
        }
    } catch (err) {
        alert('Error deleting post: ' + err.message);
    }
}

lucide.createIcons();
</script>
</body>
</html>
