<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { 
            font-family: 'Inter', sans-serif; 
        }
        
        .mono { 
            font-family: 'JetBrains Mono', monospace; 
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            color: #60a5fa;
        }
        
        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chart-container {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #0f172a;
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .hidden { display: none !important; }
        
        /* Line clamp utilities */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<script>
const API_URL = 'https://pipways-api-nhem.onrender.com';
let authToken = localStorage.getItem('pipways_token');
let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');

if (authToken) {
    showApp();
} else {
    showAuth();
}

function showAuth() {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}

function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    showPage('dashboard');
}

function showAuthTab(tab) {
    const loginBtn = document.getElementById('tab-login');
    const registerBtn = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    if (tab === 'login') {
        loginBtn.classList.add('bg-blue-500', 'text-white');
        loginBtn.classList.remove('text-slate-400');
        registerBtn.classList.remove('bg-blue-500', 'text-white');
        registerBtn.classList.add('text-slate-400');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        registerBtn.classList.add('bg-blue-500', 'text-white');
        registerBtn.classList.remove('text-slate-400');
        loginBtn.classList.remove('bg-blue-500', 'text-white');
        loginBtn.classList.add('text-slate-400');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
    document.getElementById('auth-error').classList.add('hidden');
}

function getErrorMessage(data) {
    if (typeof data === 'string') return data;
    if (data.detail) {
        if (typeof data.detail === 'string') return data.detail;
        if (Array.isArray(data.detail)) {
            return data.detail.map(err => {
                if (typeof err === 'string') return err;
                if (err.msg) return err.msg;
                if (err.message) return err.message;
                return JSON.stringify(err);
            }).join(', ');
        }
        return JSON.stringify(data.detail);
    }
    if (data.message) return data.message;
    if (data.error) return data.error;
    return JSON.stringify(data);
}

async function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        
        const response = await fetch(API_URL + '/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        formData.append('name', form.name.value);
        
        const response = await fetch(API_URL + '/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

function logout() {
    localStorage.removeItem('pipways_token');
    localStorage.removeItem('pipways_user');
    authToken = null;
    currentUser = {};
    showAuth();
}

async function apiCall(endpoint, options = {}) {
    const headers = {
        'Authorization': 'Bearer ' + authToken,
        ...options.headers
    };
    
    const response = await fetch(API_URL + endpoint, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Session expired. Please login again.');
    }
    
    return response;
}

async function showPage(page) {
    const content = document.getElementById('content');
    
    // Update sidebar active state
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    const activeBtn = document.querySelector('[onclick="showPage(\'' + page + '\')"]');
    if (activeBtn) {
        activeBtn.classList.add('active');
    }

    if (page === 'dashboard') {
        await renderDashboard(content);
    } else if (page === 'journal') {
        renderJournal(content);
    } else if (page === 'analysis') {
        renderChartAnalysis(content);
    } else if (page === 'trade-analysis') {
        renderTradeAnalysis(content);
    } else if (page === 'discipline') {
        renderDiscipline(content);
    } else if (page === 'mentor') {
        renderMentor(content);
    } else if (page === 'blog') {
        renderBlog(content);
    } else if (page === 'admin') {
        renderAdmin(content);
    }
    
    // Show admin nav if user is admin
    if (currentUser.is_admin) {
        const adminNav = document.getElementById('admin-nav');
        if (adminNav) adminNav.classList.remove('hidden');
    }
    
    lucide.createIcons();
}

async function renderDashboard(content) {
    try {
        const response = await apiCall('/trades');
        const trades = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(trades));
        }
        
        const totalPips = trades.reduce((a, b) => a + (b.pips || 0), 0);
        const wins = trades.filter(t => t.pips > 0).length;
        const winRate = trades.length ? (wins / trades.length * 100).toFixed(0) : 0;
        
        let html = '<div class="p-8 max-w-7xl mx-auto">';
        html += '<div class="flex items-center justify-between mb-8">';
        html += '<div>';
        html += '<h2 class="text-3xl font-bold text-white mb-1">Dashboard</h2>';
        html += '<p class="text-slate-400">Welcome back, ' + (currentUser.name || 'Trader') + '</p>';
        html += '</div>';
        html += '<button onclick="showPage(\'journal\')" class="btn-primary px-6 py-2.5 rounded-lg text-white font-medium flex items-center gap-2">';
        html += '<i data-lucide="plus" class="w-4 h-4"></i> New Trade';
        html += '</button>';
        html += '</div>';
        
        // Metrics Grid
        html += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">';
        
        // Discipline Score
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">';
        html += '<i data-lucide="shield" class="w-6 h-6 text-blue-400"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-emerald-400 flex items-center gap-1">';
        html += '<i data-lucide="trending-up" class="w-3 h-3"></i> +12%';
        html += '</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Discipline Score</div>';
        html += '<div class="text-3xl font-bold text-white">87<span class="text-lg text-slate-500">/100</span></div>';
        html += '</div>';
        
        // Win Rate
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg bg-violet-500/20 flex items-center justify-center">';
        html += '<i data-lucide="target" class="w-6 h-6 text-violet-400"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-slate-500">All time</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Win Rate</div>';
        html += '<div class="text-3xl font-bold text-white">' + winRate + '<span class="text-lg text-slate-500">%</span></div>';
        html += '</div>';
        
        // Total Pips
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg ' + (totalPips >= 0 ? 'bg-emerald-500/20' : 'bg-red-500/20') + ' flex items-center justify-center">';
        html += '<i data-lucide="activity" class="w-6 h-6 ' + (totalPips >= 0 ? 'text-emerald-400' : 'text-red-400') + '"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-slate-500">Total</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Total Pips</div>';
        html += '<div class="text-3xl font-bold ' + (totalPips >= 0 ? 'text-emerald-400' : 'text-red-400') + '">';
        html += (totalPips > 0 ? '+' : '') + totalPips;
        html += '</div>';
        html += '</div>';
        
        // Total Trades
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg bg-orange-500/20 flex items-center justify-center">';
        html += '<i data-lucide="bar-chart-2" class="w-6 h-6 text-orange-400"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-slate-500">This month</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Total Trades</div>';
        html += '<div class="text-3xl font-bold text-white">' + trades.length + '</div>';
        html += '</div>';
        
        html += '</div>'; // End metrics grid
        
        // Recent Trades & Quick Actions
        html += '<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">';
        
        // Recent Trades
        html += '<div class="lg:col-span-2 glass rounded-xl p-6">';
        html += '<div class="flex items-center justify-between mb-6">';
        html += '<h3 class="text-lg font-semibold text-white">Recent Trades</h3>';
        html += '<button onclick="showPage(\'journal\')" class="text-sm text-blue-400 hover:text-blue-300 font-medium">View All</button>';
        html += '</div>';
        html += '<div class="space-y-3">';
        
        if (trades.length > 0) {
            trades.slice(0, 5).forEach(function(t) {
                const date = new Date(t.created_at);
                const dateStr = date.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
                const yearStr = date.getFullYear();
                
                html += '<div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg border border-slate-700/50 hover:border-slate-600 transition-colors">';

                html += '<div class="text-center min-w-[60px]">';
                html += '<div class="text-xs text-slate-500">' + dateStr + '</div>';

async function addTrade(e) {
    e.preventDefault();
    const f = e.target;
    const btn = f.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    
    btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2"></div> Saving...';
    btn.disabled = true;
    
    try {
        const formData = new URLSearchParams();
        formData.append('pair', f.pair.value.toUpperCase());
        formData.append('direction', f.direction.value);
        formData.append('pips', f.pips.value);
        formData.append('grade', f.grade.value);
        if (f.entry_price.value) formData.append('entry_price', f.entry_price.value);
        if (f.exit_price.value) formData.append('exit_price', f.exit_price.value);
        
        const response = await apiCall('/trades', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Saved!';
        btn.classList.remove('bg-emerald-500');
        btn.classList.add('bg-emerald-600');
        
        setTimeout(function() {
            showPage('dashboard');
        }, 1000);
        
    } catch (err) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        alert('Error: ' + err.message);
    }
}

    loadingDiv.classList.remove('hidden');
    resultDiv.classList.add('hidden');
    
    try {

        });

async function askMentor() {

    const chat = document.getElementById('chatHistory');

    chat.innerHTML += typingHtml;
    chat.scrollTop = chat.scrollHeight;
    
    try {
        const response = await apiCall('/mentorship/personalized?message=' + encodeURIComponent(message), {

        responseHtml += '</div>';

        if (data.personalized_response) {
            responseHtml += '<p class="text-slate-200 text-sm leading-relaxed">' + data.personalized_response + '</p>';
            if (data.identified_pattern) {
                responseHtml += '<div class="mt-2 pt-2 border-t border-slate-700">';
                responseHtml += '<p class="text-xs text-violet-400">Pattern: ' + data.identified_pattern + '</p>';
                responseHtml += '</div>';

async function loadBlogPosts(category, search) {
    category = category || 'all';
    search = search || '';
    
    try {
        let url = '/blog/posts?status=published&per_page=12';
        if (category !== 'all') url += '&category=' + encodeURIComponent(category);
        if (search) url += '&search=' + encodeURIComponent(search);
        
        const response = await fetch(API_URL + url);
        const data = await response.json();
        
        const container = document.getElementById('blogPosts');
        
        if (!data.posts || data.posts.length === 0) {
            container.innerHTML = '<p class="text-slate-500 col-span-3 text-center py-12">No articles found</p>';
            return;
        }
        
        let html = '';
        data.posts.forEach(function(post) {
            const date = new Date(post.published_at);
            
            html += '<article class="glass rounded-xl overflow-hidden card-hover cursor-pointer" onclick="showBlogPost(\'' + post.slug + '\')">';
            
            if (post.featured_image) {
                html += '<div class="h-48 bg-cover bg-center" style="background-image: url(\'' + post.featured_image + '\')"></div>';
            } else {
                html += '<div class="h-48 bg-gradient-to-br from-blue-500/20 to-violet-500/20 flex items-center justify-center">';
                html += '<i data-lucide="image" class="w-12 h-12 text-slate-600"></i>';
                html += '</div>';
            }
            
            html += '<div class="p-6">';
            html += '<div class="flex items-center gap-2 mb-3">';
            html += '<span class="px-2 py-1 bg-blue-500/20 text-blue-400 text-xs rounded">' + (post.category || 'General') + '</span>';
            html += '<span class="text-xs text-slate-500">' + date.toLocaleDateString() + '</span>';
            html += '</div>';
            html += '<h3 class="text-lg font-bold text-white mb-2 line-clamp-2">' + post.title + '</h3>';
            html += '<p class="text-sm text-slate-400 line-clamp-3 mb-4">' + post.excerpt + '</p>';
            html += '<div class="flex items-center justify-between text-xs text-slate-500">';
            html += '<span class="flex items-center gap-1">';
            html += '<i data-lucide="eye" class="w-3 h-3"></i> ' + (post.view_count || 0) + ' views';
            html += '</span>';
            html += '<span class="text-blue-400">Read more →</span>';
            html += '</div>';
            html += '</div>';
            html += '</article>';
        });
        
        container.innerHTML = html;
        lucide.createIcons();
        
    } catch (err) {
        document.getElementById('blogPosts').innerHTML = '<p class="text-red-400 col-span-3 text-center py-12">Error loading articles: ' + err.message + '</p>';
    }
}

function filterBlog(category) {
    // Update active button
    const buttons = document.querySelectorAll('#blogCategories button');
    buttons.forEach(function(btn) {
        if (btn.textContent.toLowerCase().includes(category.replace('-', ' ')) || (category === 'all' && btn.textContent === 'All')) {
            btn.classList.remove('bg-slate-800', 'text-slate-300');
            btn.classList.add('bg-blue-500', 'text-white');
        } else {
            btn.classList.remove('bg-blue-500', 'text-white');
            btn.classList.add('bg-slate-800', 'text-slate-300');
        }
    });
    
    loadBlogPosts(category);
}

function searchBlog() {
    const search = document.getElementById('blogSearch').value;
    loadBlogPosts('all', search);
}

        if (post.featured_image) {

async function saveBlogPost(e) {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    
    try {
        const formData = new URLSearchParams();
        formData.append('title', form.title.value);
        formData.append('content', form.content.value);
        formData.append('category', form.category.value);
        formData.append('status', form.status.value);
        if (form.excerpt.value) formData.append('excerpt', form.excerpt.value);
        if (form.tags.value) formData.append('tags', form.tags.value);
        
        const response = await apiCall('/admin/blog/posts', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        alert('Post saved successfully!');
        document.getElementById('adminSection').classList.add('hidden');
        loadAdminStats();
        
    } catch (err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Save Post';
    }
}

async function renderBlogPostsList(container) {

        if (!data.posts || data.posts.length === 0) {

async function deleteBlogPost(postId) {
    if (!confirm('Are you sure you want to delete this post?')) return;
    
    try {
        const response = await apiCall('/admin/blog/posts/' + postId, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            alert('Post deleted');
            renderBlogPostsList(document.getElementById('adminSection'));
        } else {
            throw new Error('Failed to delete');
        }
        
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

async function loadMediaFiles() {
    try {
        const response = await apiCall('/admin/media');
        const data = await response.json();
        const container = document.getElementById('mediaGrid');
        
        if (!data.media || data.media.length === 0) {
            container.innerHTML = '<p class="text-slate-500 col-span-full">No media files</p>';
            return;
        }
        
        let html = '';
        data.media.forEach(function(file) {
            const isImage = ['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(file.file_type.toLowerCase());
            
            html += '<div class="aspect-square bg-slate-800 rounded-lg overflow-hidden relative group cursor-pointer" onclick="copyMediaUrl(\'' + file.url + '\')">';
            
            if (isImage) {
                html += '<img src="' + file.url + '" class="w-full h-full object-cover" alt="' + (file.alt_text || '') + '">';
            } else {
                html += '<div class="w-full h-full flex items-center justify-center bg-slate-700">';
                html += '<i data-lucide="file" class="w-8 h-8 text-slate-500"></i>';
                html += '</div>';
            }
            
            html += '<div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">';
            html += '<span class="text-white text-xs">Click to copy URL</span>';
            html += '</div>';
            html += '</div>';
        });
        
        container.innerHTML = html;
        lucide.createIcons();
        
    } catch (err) {
        document.getElementById('mediaGrid').innerHTML = '<p class="text-red-400 col-span-full">Error loading media</p>';
    }
}

async function uploadMedia(input) {
    const file = input.files[0];
    if (!file) return;
    
    try {
        const formData = new FormData();
        formData.append('file', file);
        
        const response = await apiCall('/admin/media/upload', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (data.success) {
            alert('Media uploaded: ' + data.url);
            loadMediaFiles();
        } else {
            throw new Error(data.error || 'Upload failed');
        }
        
    } catch (err) {
        alert('Error: ' + err.message);
    }
}

function copyMediaUrl(url) {
    navigator.clipboard.writeText(API_URL + url).then(function() {
        alert('URL copied to clipboard');
    });
}
