<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            color: #60a5fa;
        }
        
        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .checklist-item {
            transition: all 0.2s ease;
        }
        
        .checklist-item:hover {
            background: rgba(59, 130, 246, 0.05);
        }
        
        .checklist-item.checked {
            opacity: 0.7;
        }
        
        .checklist-item.checked .check-text {
            text-decoration: line-through;
            color: #64748b;
        }
        
        .progress-ring {
            transform: rotate(-90deg);
        }
        
        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
        }
        
        .blog-card {
            transition: all 0.3s ease;
        }
        
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        
        /* Mobile Bottom Navigation */
        .mobile-sidebar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom));
            z-index: 50;
        }
        
        .nav-btn-mobile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem;
            color: #64748b;
            transition: all 0.2s;
            font-size: 0.65rem;
            flex: 1;
        }
        
        .nav-btn-mobile.active {
            color: #3b82f6;
        }
        
        .nav-btn-mobile i {
            width: 24px;
            height: 24px;
        }
        
        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            color: white;
            font-size: 0.875rem;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 90vw;
            text-align: center;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* Upload Zone */
        .upload-zone {
            transition: all 0.3s ease;
        }
        
        .upload-zone.dragover {
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.1) !important;
        }
        
        /* Image Preview */
        .image-preview {
            max-height: 200px;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        
        /* Performance Score Ring */
        .score-ring {
            transform: rotate(-90deg);
        }
        
        .score-ring-circle {
            transition: stroke-dashoffset 1s ease;
            transform-origin: 50% 50%;
        }
        
        /* Video Container */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 0.75rem;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Quiz Styles */
        .quiz-option {
            transition: all 0.2s ease;
        }
        
        .quiz-option:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        
        .quiz-option.selected {
            background: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }
        
        .quiz-option.correct {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
        
        .quiz-option.incorrect {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }
        
        /* Certificate Styles */
        .certificate-frame {
            border: 8px solid #f59e0b;
            border-radius: 4px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            position: relative;
        }
        
        .certificate-frame::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 2px solid #d97706;
            border-radius: 2px;
        }
        
        /* Responsive Utilities */
        @media (max-width: 1024px) {
            .desktop-sidebar {
                display: none;
            }
            .mobile-sidebar {
                display: flex;
            }
            #content {
                padding-bottom: 80px;
            }
        }
        
        @media (min-width: 1025px) {
            .mobile-sidebar {
                display: none !important;
            }
        }
        
        /* Touch-friendly improvements */
        @media (pointer: coarse) {
            .checklist-checkbox {
                width: 24px !important;
                height: 24px !important;
            }
            button, input, select, textarea, label {
                min-height: 44px;
            }
            .nav-btn-mobile {
                min-height: 56px;
            }
        }
        
        /* Safe area for notched devices */
        @supports (padding-top: env(safe-area-inset-top)) {
            .mobile-sidebar {
                padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
            }
        }
        
        .hidden { display: none !important; }
    </style>
</head>

<script>
const API_URL = 'https://pipways-api-nhem.onrender.com';
let authToken = localStorage.getItem('pipways_token');
let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');
let checklistData = {};
let currentPage = 'dashboard';
let subscriptionStatus = null;

if (authToken) {
    showApp();
} else {
    showAuth();
}

function showToast(message, duration = 3000) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toast-message');
    toastMessage.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, duration);
}

function showAuth() {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}

function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    
    if (currentUser.is_admin) {
        document.getElementById('admin-menu-item-desktop')?.classList.remove('hidden');
    }
    
    checkSubscription();
    showPage('dashboard');
}

async function checkSubscription() {
    try {
        const response = await apiCall('/subscription/status');
        subscriptionStatus = await response.json();
    } catch (err) {
        console.error('Failed to check subscription:', err);
    }
}

function showAuthTab(tab) {
    const loginBtn = document.getElementById('tab-login');
    const registerBtn = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    if (tab === 'login') {
        loginBtn.classList.add('bg-blue-500', 'text-white');
        loginBtn.classList.remove('text-slate-400');
        registerBtn.classList.remove('bg-blue-500', 'text-white');
        registerBtn.classList.add('text-slate-400');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        registerBtn.classList.add('bg-blue-500', 'text-white');
        registerBtn.classList.remove('text-slate-400');
        loginBtn.classList.remove('bg-blue-500', 'text-white');
        loginBtn.classList.add('text-slate-400');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
    document.getElementById('auth-error').classList.add('hidden');
}

function getErrorMessage(data) {
    if (typeof data === 'string') return data;
    if (data.detail) {
        if (typeof data.detail === 'string') return data.detail;
        if (Array.isArray(data.detail)) {
            return data.detail.map(err => {
                if (typeof err === 'string') return err;
                if (err.msg) return err.msg;
                if (err.message) return err.message;
                return JSON.stringify(err);
            }).join(', ');
        }
        return JSON.stringify(data.detail);
    }
    if (data.message) return data.message;
    if (data.error) return data.error;
    return JSON.stringify(data);
}

async function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));

    } catch (err) {

}

async function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        formData.append('name', form.name.value);
        
        const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        showToast('Welcome! Your 3-day trial has started.');
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

function logout() {
    localStorage.removeItem('pipways_token');
    localStorage.removeItem('pipways_user');
    authToken = null;
    currentUser = {};
    subscriptionStatus = null;
    showAuth();
}

async function apiCall(endpoint, options = {}) {
    const headers = {
        'Authorization': `Bearer ${authToken}`,
        ...options.headers
    };
    
    const response = await fetch(`${API_URL}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Session expired. Please login again.');
    }
    
    return response;
}

async function showPage(page) {
    currentPage = page;
    const content = document.getElementById('content');
    
    // Update desktop sidebar
    document.querySelectorAll('.sidebar-link').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Update mobile nav
    document.querySelectorAll('.nav-btn-mobile').forEach(btn => {
        btn.classList.remove('active');
    });
    
    // Handle "More" menu on mobile
    if (page === 'more') {
        showMobileMenu();
        return;
    }
    
    // Set active states
    const desktopBtn = document.querySelector(`.desktop-sidebar [onclick="showPage('${page}')"]`);
    if (desktopBtn) desktopBtn.classList.add('active');
    
    const mobileBtn = document.querySelector(`.nav-btn-mobile[data-page="${page}"]`);
    if (mobileBtn) mobileBtn.classList.add('active');
    
    // Route to page
    const pageRenderers = {
        'dashboard': renderDashboard,
        'analytics': renderAnalytics,
        'journal': renderJournal,
        'performance': renderPerformance,
        'analysis': renderChartAnalysis,
        'courses': renderCourses,
        'webinars': renderWebinars,
        'discipline': renderDiscipline,
        'mentor': renderMentor,
        'subscription': renderSubscription,
        'blog': renderBlog,
        'admin': renderAdmin
    };
    
    if (pageRenderers[page]) {
        await pageRenderers[page](content);
    }
    
    // Scroll to top
    content.scrollTop = 0;
    
    lucide.createIcons();
}

function initChecklistHandlers() {
    const checkboxes = document.querySelectorAll('.checklist-checkbox');
    const progressCircle = document.getElementById('progress-circle');
    const progressText = document.getElementById('progress-text');
    
    if (!progressCircle || !progressText) return;
    
    checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const parent = this.closest('.checklist-item');
            if (this.checked) {
                parent.classList.add('checked');
            } else {
                parent.classList.remove('checked');
            }
            updateProgress();
        });
    });
    
    function updateProgress() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('.checklist-checkbox:checked').length;
        const percentage = total > 0 ? Math.round((checked / total) * 100) : 0;
        
        const circumference = 2 * Math.PI * 26; // r=26
        const offset = circumference - (percentage / 100) * circumference;
        
        progressCircle.style.strokeDashoffset = offset;
        progressText.textContent = `${percentage}%`;
        
        // Store checklist data
        checklistData = {
            completed: checked,
            total: total,
            items: Array.from(checkboxes).map(cb => ({
                id: cb.dataset.id,
                checked: cb.checked,
                required: cb.dataset.required === 'true'
            }))
        };
    }
    
    updateProgress();
}

async function addTrade(e) {
    e.preventDefault();
    const f = e.target;
    const btn = document.getElementById('submit-trade-btn');
    const warningEl = document.getElementById('checklist-warning');
    
    // Validate checklist
    const requiredCheckboxes = document.querySelectorAll('.checklist-checkbox[data-required="true"]');
    const allRequiredChecked = Array.from(requiredCheckboxes).every(cb => cb.checked);
    
    if (!allRequiredChecked) {
        warningEl.classList.remove('hidden');
        warningEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        showToast('Complete all required checklist items');
        return;
    }
    
    warningEl.classList.add('hidden');
    const originalText = btn.innerHTML;
    
    btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2"></div> Saving...';
    btn.disabled = true;
    
    try {
        const formData = new URLSearchParams();
        formData.append('pair', f.pair.value.toUpperCase());
        formData.append('direction', f.direction.value);
        formData.append('pips', f.pips.value);
        formData.append('grade', f.grade.value);
        formData.append('checklist_completed', 'true');
        formData.append('checklist_data', JSON.stringify(checklistData));
        if (f.entry_price.value) formData.append('entry_price', f.entry_price.value);
        if (f.exit_price.value) formData.append('exit_price', f.exit_price.value);
        
        const response = await apiCall('/trades', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Saved!';
        showToast('Trade saved successfully!');
        
        setTimeout(() => {
            showPage('dashboard');
        }, 1000);
        
    } catch (err) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        showToast('Error: ' + err.message);
    }
}

function handleDragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add('dragover');
}

function handleDragLeave(e) {
    e.currentTarget.classList.remove('dragover');
}

function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        const input = document.getElementById('chartUpload');
        input.files = files;
        analyzeChart(input);
    }
}

async function analyzeChart(input) {
    const file = input.files[0];
    if (!file) return;

    // Validate file size (max 5MB)
    if (file.size > 5 * 1024 * 1024) {
        showToast('Image too large. Max 5MB');
        return;
    }

    const loadingDiv = document.getElementById('analysisLoading');
    const resultDiv = document.getElementById('analysisResult');
    
    loadingDiv.classList.remove('hidden');
    resultDiv.classList.add('hidden');
    
    try {
        const formData = new FormData();
        formData.append('file', file);
        
        const response = await apiCall('/analyze-chart', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        loadingDiv.classList.add('hidden');
        resultDiv.classList.remove('hidden');

function saveAnalysisToJournal(pair, direction, grade) {
    showPage('journal');
    setTimeout(() => {
        const pairInput = document.querySelector('input[name="pair"]');
        const directionSelect = document.querySelector('select[name="direction"]');
        const gradeSelect = document.querySelector('select[name="grade"]');
        
        if (pairInput) pairInput.value = pair;
        if (directionSelect) directionSelect.value = direction;
        if (gradeSelect) gradeSelect.value = grade;
        
        showToast(`Analysis for ${pair} ${direction} loaded!`);
    }, 500);
}

function filterCourses(level) {
    const cards = document.querySelectorAll('.course-card');
    cards.forEach(card => {
        if (level === 'all' || card.dataset.level === level) {
            card.classList.remove('hidden');
        } else {
            card.classList.add('hidden');
        }
    });
}

async function completeLesson(courseId, lessonId) {
    try {
        const formData = new URLSearchParams();
        formData.append('lesson_id', lessonId);
        formData.append('completed', 'true');
        
        await apiCall(`/courses/${courseId}/progress`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        showToast('Lesson completed!');
        openCourse(courseId);
    } catch (err) {
        showToast('Error: ' + err.message);
    }
}

async function startQuiz(courseId) {
    const content = document.getElementById('content');
    try {
        const response = await apiCall(`/courses/${courseId}`);
        const course = await response.json();
        const questions = JSON.parse(course.quiz_questions || '[]');
        
        let currentQuestion = 0;
        const answers = [];
        
        function renderQuestion() {
            const q = questions[currentQuestion];
            content.querySelector('#quiz-container').innerHTML = `
                <div class="glass rounded-xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <span class="text-sm text-slate-400">Question ${currentQuestion + 1} of ${questions.length}</span>
                        <div class="w-32 bg-slate-700 rounded-full h-2">
                            <div class="bg-blue-500 h-2 rounded-full" style="width: ${((currentQuestion + 1) / questions.length) * 100}%"></div>
                        </div>
                    </div>
                    
                    <h4 class="text-lg font-semibold text-white mb-6">${q.question}</h4>
                    
                    <div class="space-y-3">
                        ${q.options.map((opt, idx) => `
                            <button onclick="selectAnswer(${idx})" class="quiz-option w-full p-4 bg-slate-800/50 border border-slate-700 rounded-lg text-left text-slate-200 hover:border-blue-500" data-idx="${idx}">
                                <div class="flex items-center gap-3">
                                    <div class="w-6 h-6 rounded-full border-2 border-slate-600 flex items-center justify-center option-circle">
                                        <div class="w-3 h-3 rounded-full bg-blue-500 hidden"></div>
                                    </div>
                                    <span>${opt}</span>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                    
                    <button onclick="nextQuestion()" id="next-btn" class="mt-6 w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-lg text-white font-medium disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        ${currentQuestion < questions.length - 1 ? 'Next Question' : 'Submit Quiz'}
                    </button>
                </div>
            `;
            
            // Attach selectAnswer to window
            window.selectAnswer = (idx) => {
                answers[currentQuestion] = idx;
                document.querySelectorAll('.quiz-option').forEach((btn, i) => {
                    if (i === idx) {
                        btn.classList.add('selected');
                        btn.querySelector('.option-circle div').classList.remove('hidden');
                    } else {
                        btn.classList.remove('selected');
                        btn.querySelector('.option-circle div').classList.add('hidden');
                    }
                });
                document.getElementById('next-btn').disabled = false;
            };
            
            window.nextQuestion = async () => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    renderQuestion();
                } else {
                    // Submit quiz
                    try {
                        const formData = new URLSearchParams();
                        formData.append('answers', JSON.stringify(answers));
                        
                        const submitRes = await apiCall(`/courses/${courseId}/quiz`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                            body: formData.toString()
                        });
                        
                        const result = await submitRes.json();
                        
                        content.querySelector('#quiz-container').innerHTML = `
                            <div class="glass rounded-xl p-8 text-center">
                                <div class="w-20 h-20 mx-auto mb-4 rounded-full ${result.passed ? 'bg-emerald-500/20' : 'bg-orange-500/20'} flex items-center justify-center">
                                    <i data-lucide="${result.passed ? 'check-circle' : 'alert-circle'}" class="w-10 h-10 ${result.passed ? 'text-emerald-400' : 'text-orange-400'}"></i>
                                </div>
                                <h3 class="text-2xl font-bold text-white mb-2">${result.passed ? 'Congratulations!' : 'Keep Learning'}</h3>
                                <p class="text-slate-400 mb-4">You scored ${result.score}%</p>
                                ${result.passed ? `
                                    <p class="text-emerald-400 mb-6">You've earned your certificate!</p>
                                    <button onclick="openCourse(${courseId})" class="px-6 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-lg text-white font-medium">
                                        View Certificate
                                    </button>
                                ` : `
                                    <p class="text-orange-400 mb-6">You need ${course.passing_score}% to pass. Review the lessons and try again.</p>
                                    <button onclick="openCourse(${courseId})" class="px-6 py-3 bg-blue-500 hover:bg-blue-600 rounded-lg text-white font-medium">
                                        Back to Course
                                    </button>
                                `}
                            </div>
                        `;
                        lucide.createIcons();
                    } catch (err) {
                        showToast('Error submitting quiz: ' + err.message);
                    }
                }
            };
        }
        
        content.innerHTML = `
            <div class="p-4 md:p-8 max-w-2xl mx-auto fade-in pb-24 md:pb-8">
                <button onclick="openCourse(${courseId})" class="mb-4 flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Course
                </button>
                <div id="quiz-container"></div>
            </div>
        `;
        
        renderQuestion();
        
    } catch (err) {
        showToast('Error loading quiz: ' + err.message);
    }
    lucide.createIcons();
}

function quickAsk(message) {

async function askMentor() {
    const input = document.getElementById('mentorInput');
    const message = input.value.trim();
    if (!message) return;
    
    const chat = document.getElementById('chatHistory');
    
    // Add user message
    chat.innerHTML += `
        <div class="flex gap-3 flex-row-reverse">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0">
                <i data-lucide="user" class="w-4 h-4 md:w-5 md:h-5 text-slate-300"></i>
            </div>
            <div class="bg-blue-600 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%] md:max-w-[80%]">
                <p class="text-white text-sm leading-relaxed">${message}</p>
            </div>
        </div>
    `;
    
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    lucide.createIcons();
    
    // Show typing indicator
    const typingId = 'typing-' + Date.now();
    chat.innerHTML += `
        <div id="${typingId}" class="flex gap-3">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                <i data-lucide="bot" class="w-4 h-4 md:w-5 md:h-5 text-white"></i>
            </div>
            <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-4 py-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </div>
    `;
    chat.scrollTop = chat.scrollHeight;
    
    try {
        const response = await apiCall(`/mentor-chat?message=${encodeURIComponent(message)}`);
        const data = await response.json();
        
        // Remove typing indicator
        document.getElementById(typingId).remove();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        chat.innerHTML += `
            <div class="flex gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-4 h-4 md:w-5 md:h-5 text-white"></i>
                </div>
                <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] md:max-w-[80%]">
                    <p class="text-slate-200 text-sm leading-relaxed">${data.response}</p>
                    ${data.fallback ? '<span class="text-xs text-slate-600 mt-2 block">Offline mode</span>' : ''}
                </div>
            </div>
        `;
        
    } catch (err) {
        document.getElementById(typingId).remove();
        chat.innerHTML += `
            <div class="flex gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="alert-circle" class="w-4 h-4 md:w-5 md:h-5 text-red-400"></i>
                </div>
                <div class="bg-red-500/10 border border-red-500/20 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] md:max-w-[80%]">
                    <p class="text-red-400 text-sm">Sorry, I'm having trouble connecting. Please try again.</p>
                </div>
            </div>
        `;
    }
    
    lucide.createIcons();
    chat.scrollTop = chat.scrollHeight;
}

function sharePost(title, slug) {
    const url = `${window.location.origin}/blog/${slug}`;
    if (navigator.share) {
        navigator.share({
            title: title,
            url: url
        });
    } else {
        navigator.clipboard.writeText(url);
        showToast('Link copied to clipboard!');
    }
}

                                <input name="tags" id="post-tags" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-sm" placeholder="forex, psychology, risk">
                            </div>
                        </div>
                        
                        <!-- Featured Image Upload -->
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Featured Image</label>
                            <div class="space-y-3">
                                <div class="flex gap-2">
                                    <input type="file" id="featured-image-input" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                                    <button type="button" onclick="document.getElementById('featured-image-input').click()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 text-sm flex items-center gap-2">
                                        <i data-lucide="image-plus" class="w-4 h-4"></i> Upload Image
                                    </button>
                                    <span id="image-filename" class="text-slate-400 text-sm self-center"></span>
                                </div>
                                <input type="hidden" name="featured_image" id="featured-image-data">
                                <div id="image-preview-container" class="hidden">
                                    <img id="image-preview" class="image-preview max-h-48 rounded-lg border border-slate-700">
                                    <button type="button" onclick="removeImage()" class="mt-2 text-xs text-red-400 hover:text-red-300">Remove image</button>
                                </div>
                                <p class="text-xs text-slate-500">Max 2MB. Recommended: 1200x630px for social sharing.</p>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Excerpt</label>
                            <textarea name="excerpt" id="post-excerpt" rows="2" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-sm" placeholder="Brief summary for SEO and previews..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase">Content</label>
                            <textarea name="content" id="post-content" required rows="6" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-sm"></textarea>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <input type="checkbox" name="published" id="publish-check" class="w-5 h-5 rounded border-slate-600 bg-slate-800 text-blue-500">
                            <label for="publish-check" class="text-sm text-slate-300">Publish immediately</label>
                        </div>
                        
                        <div class="flex gap-3">
                            <button type="submit" class="px-6 py-2.5 bg-blue-500 hover:bg-blue-600 rounded-lg text-white font-medium text-sm">Save Post</button>
                            <button type="button" onclick="document.getElementById('post-form').classList.add('hidden')" class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 font-medium text-sm">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
    } catch (err) {
        content.innerHTML = `<div class="p-4 md:p-8"><div class="p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm">${err.message}</div></div>`;
    }
}

function generateSlug(title) {
    const slug = title.toLowerCase()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .substring(0, 60);
    document.getElementById('post-slug').value = slug;
}

function handleImageUpload(input) {
    const file = input.files[0];
    if (!file) return;
    
    if (file.size > 2 * 1024 * 1024) {
        showToast('Image too large. Max 2MB');
        return;
    }
    
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('featured-image-data').value = e.target.result;
        document.getElementById('image-preview').src = e.target.result;
        document.getElementById('image-preview-container').classList.remove('hidden');
        document.getElementById('image-filename').textContent = file.name;
    };
    reader.readAsDataURL(file);
}

function removeImage() {
    document.getElementById('featured-image-input').value = '';
    document.getElementById('featured-image-data').value = '';
    document.getElementById('image-preview-container').classList.add('hidden');
    document.getElementById('image-filename').textContent = '';
}

function showNewPostForm() {
    document.getElementById('post-form').classList.remove('hidden');
    document.getElementById('form-title').textContent = 'Create New Post';
    document.getElementById('blog-post-form').reset();
    document.getElementById('edit-post-id').value = '';
    document.getElementById('image-preview-container').classList.add('hidden');
    document.getElementById('post-form').scrollIntoView({ behavior: 'smooth' });
}

async function editPost(postId) {
    try {
        const response = await apiCall(`/admin/blog/posts/${postId}`);
        const post = await response.json();
        
        document.getElementById('post-form').classList.remove('hidden');
        document.getElementById('form-title').textContent = 'Edit Post';
        document.getElementById('edit-post-id').value = postId;
        document.getElementById('post-title').value = post.title;
        document.getElementById('post-slug').value = post.slug;
        document.getElementById('post-category').value = post.category || '';
        document.getElementById('post-tags').value = post.tags ? post.tags.join(', ') : '';
        document.getElementById('post-excerpt').value = post.excerpt || '';
        document.getElementById('post-content').value = post.content || '';
        document.getElementById('publish-check').checked = post.published;
        
        if (post.featured_image) {
            document.getElementById('featured-image-data').value = post.featured_image;
            document.getElementById('image-preview').src = post.featured_image;
            document.getElementById('image-preview-container').classList.remove('hidden');
        }
        
        document.getElementById('post-form').scrollIntoView({ behavior: 'smooth' });
    } catch (err) {
        showToast('Error loading post: ' + err.message);
    }
}

async function saveBlogPost(e) {
    e.preventDefault();
    const f = e.target;
    const postId = document.getElementById('edit-post-id').value;
    const btn = f.querySelector('button[type="submit"]');
    const originalText = btn.textContent;
    
    btn.textContent = 'Saving...';
    btn.disabled = true;
    
    try {
        const formData = new URLSearchParams();
        formData.append('title', f.title.value);
        formData.append('slug', f.slug.value);
        formData.append('content', f.content.value);
        formData.append('excerpt', f.excerpt.value);
        formData.append('category', f.category.value);
        formData.append('tags', f.tags.value);
        formData.append('featured_image', document.getElementById('featured-image-data').value);
        formData.append('published', f.published.checked);
        
        const endpoint = postId ? `/admin/blog/posts/${postId}` : '/admin/blog/posts';
        const method = postId ? 'PUT' : 'POST';
        
        const response = await apiCall(endpoint, {
            method: method,
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        showToast(postId ? 'Post updated successfully!' : 'Post created successfully!');
        renderAdmin(document.getElementById('content'));
        
    } catch (err) {
        showToast('Error: ' + err.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

async function deletePost(postId) {
    if (!confirm('Are you sure you want to delete this post?')) return;
    
    try {
        const response = await apiCall(`/admin/blog/posts/${postId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            renderAdmin(document.getElementById('content'));
            showToast('Post deleted');
        } else {
            throw new Error('Failed to delete');
        }
    } catch (err) {
        showToast('Error deleting post: ' + err.message);
    }
}

lucide.createIcons();
