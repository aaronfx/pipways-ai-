<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Institutional Trader Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Editor.js and plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/embed@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.5);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }
        
        .nav-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        
        /* Editor.js Custom Styling */
        .codex-editor {
            background: #1e293b;
            border-radius: 0.5rem;
            min-height: 400px;
        }
        
        .ce-block__content, .ce-toolbar__content {
            max-width: 100%;
        }
        
        .ce-toolbar__actions {
            right: 10px;
        }
        
        .ce-block--selected .ce-block__content {
            background: #334155;
        }
        
        .ce-inline-toolbar {
            background: #1e293b;
            border-color: #334155;
        }
        
        .ce-conversion-tool__icon, .ce-popover__item-icon {
            background: #334155;
        }
        
        .ce-popover, .ce-settings {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }
        
        .cdx-search-field {
            border-color: #334155;
        }
        
        .ce-popover__item:hover, .ce-conversion-tool:hover {
            background: #334155;
        }
        
        .cdx-button {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }
        
        .cdx-button:hover {
            background: #475569;
        }
        
        .ce-header {
            color: #f8fafc;
        }
        
        .codex-editor__redactor {
            padding-bottom: 100px !important;
        }
        
        .ce-paragraph {
            color: #e2e8f0;
        }
        
        .cdx-list {
            color: #e2e8f0;
        }
        
        .cdx-quote__text {
            color: #e2e8f0;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Modal animation */
        .modal-enter {
            animation: modalFadeIn 0.3s ease;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
        <div class="glass-strong rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 rounded-xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-bold gradient-text mb-2">Pipways</h1>
                <p class="text-slate-400 text-sm">Institutional Trader Development</p>
            </div>
            
            <div id="auth-tabs" class="flex gap-2 mb-6 p-1 bg-slate-800/50 rounded-lg">
                <button onclick="showAuthTab('login')" id="tab-login" class="flex-1 py-2 rounded-md bg-blue-500 text-white font-medium text-sm transition-all">Sign In</button>
                <button onclick="showAuthTab('register')" id="tab-register" class="flex-1 py-2 rounded-md text-slate-400 hover:text-white font-medium text-sm transition-all">Register</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="admin@pipways.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-primary rounded-lg py-2.5 font-medium text-white shadow-lg">
                    Sign In
                </button>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Full Name</label>
                    <input type="text" name="name" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="••••••••">
                    <p class="text-xs text-slate-500 mt-1">Max 72 characters</p>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 rounded-lg py-2.5 font-medium text-white shadow-lg transition-all">
                    Create Account
                </button>
            </form>
            
            <div id="auth-error" class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm hidden"></div>
            
            <div class="mt-6 p-4 bg-slate-800/30 rounded-lg border border-slate-700/50">
                <p class="text-xs text-slate-500 font-medium mb-2 uppercase tracking-wider">Demo Credentials</p>
                <div class="text-xs text-slate-400 space-y-1 font-mono">
                    <p><span class="text-slate-500">Email:</span> admin@pipways.com</p>
                    <p><span class="text-slate-500">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden h-screen flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900/50 border-r border-slate-800 flex flex-col backdrop-blur-xl">
            <div class="p-6 border-b border-slate-800">

                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                        <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Pipways</h1>
                        <p class="text-xs text-slate-500">Institutional Trader</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <button onclick="showPage('dashboard')" class="nav-btn sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="showPage('journal')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Trade Journal
                </button>
                <button onclick="showPage('analysis')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="scan-eye" class="w-5 h-5"></i> Chart Analysis
                </button>
                <button onclick="showPage('trade-analysis')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="file-bar-chart" class="w-5 h-5"></i> Trade Analysis
                </button>
                <button onclick="showPage('discipline')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="shield-check" class="w-5 h-5"></i> Discipline
                </button>
                <button onclick="showPage('mentor')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="bot" class="w-5 h-5"></i> AI Mentor
                </button>
                <button onclick="showPage('blog')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="newspaper" class="w-5 h-5"></i> Blog
                </button>
                <button onclick="window.open('/webinars', '_blank')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-800">
                    <i data-lucide="video" class="w-5 h-5"></i> Webinars
                </button>
                <button onclick="showPage('admin')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300 hidden" id="admin-nav">
                    <i data-lucide="settings" class="w-5 h-5"></i> Admin
                </button>
            </nav>
            
            <div class="p-4 border-t border-slate-800 space-y-3">
                <div class="bg-slate-800/50 rounded-lg p-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-medium text-slate-400">Level 2</span>
                        <span class="text-xs font-bold text-blue-400">65%</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-gradient-to-r from-blue-500 to-violet-500 h-2 rounded-full transition-all" style="width: 65%"></div>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center gap-2 px-4 py-2.5 rounded-lg text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-gradient-to-br from-slate-950 to-slate-900" id="content"></main>
    </div>

    <!-- Blog Editor Modal -->
    <div id="blog-editor-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 overflow-y-auto">
        <div class="min-h-screen px-4 py-8">
            <div class="max-w-6xl mx-auto bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden modal-enter">
                <!-- Modal Header -->
                <div class="flex justify-between items-center p-6 border-b border-slate-800 bg-slate-800/50">
                    <h3 class="text-xl font-bold text-white flex items-center gap-2">
                        <i data-lucide="file-text" class="w-5 h-5 text-blue-400"></i>
                        <span id="editor-modal-title">Create New Post</span>
                    </h3>
                    <button onclick="closeBlogEditor()" class="text-slate-400 hover:text-white transition-colors p-2 hover:bg-slate-800 rounded-lg">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <!-- Modal Body -->
                <div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Main Editor -->
                    <div class="lg:col-span-2 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Title</label>
                            <input type="text" id="blog-title" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-lg font-medium" placeholder="Enter post title...">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Content</label>
                            <div id="editorjs" class="bg-slate-800 border border-slate-700 rounded-lg"></div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Excerpt</label>
                            <textarea id="blog-excerpt" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none resize-none" placeholder="Brief summary for blog listing..."></textarea>
                        </div>
                    </div>

                    <!-- Sidebar -->
                    <div class="space-y-4">
                        <!-- Publish Settings -->
                        <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                            <h4 class="font-medium text-white mb-4 flex items-center gap-2">
                                <i data-lucide="settings" class="w-4 h-4 text-slate-400"></i> Publish Settings
                            </h4>
                            <div class="space-y-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Status</label>
                                    <select id="blog-status" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none">
                                        <option value="draft">Draft</option>
                                        <option value="published">Published</option>
                                        <option value="scheduled">Scheduled</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Category</label>
                                    <select id="blog-category" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none">
                                        <option value="">Select Category</option>
                                        <option value="Psychology">Trading Psychology</option>
                                        <option value="Strategy">Trading Strategy</option>
                                        <option value="Risk Management">Risk Management</option>
                                        <option value="Technical Analysis">Technical Analysis</option>
                                        <option value="Fundamental Analysis">Fundamental Analysis</option>
                                        <option value="Beginner Guides">Beginner Guides</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Tags (comma separated)</label>
                                    <input type="text" id="blog-tags" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="forex, trading, psychology">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Featured Image URL</label>
                                    <input type="text" id="blog-image" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="https://...">
                                </div>
                            </div>
                        </div>

                        <!-- SEO -->
                        <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                            <h4 class="font-medium text-white mb-4 flex items-center gap-2">
                                <i data-lucide="search" class="w-4 h-4 text-slate-400"></i> SEO
                            </h4>
                            <div class="space-y-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Meta Title <span class="text-slate-500">(<span id="meta-title-count">0</span>/70)</span></label>
                                    <input type="text" id="blog-meta-title" maxlength="70" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="SEO title...">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Meta Description <span class="text-slate-500">(<span id="meta-desc-count">0</span>/160)</span></label>
                                    <textarea id="blog-meta-desc" maxlength="160" rows="2" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none resize-none" placeholder="SEO description..."></textarea>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Focus Keyword</label>
                                    <input type="text" id="blog-keyword" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="Primary keyword">
                                </div>
                            </div>
                            <button onclick="analyzeBlogSEO()" class="w-full mt-3 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                                <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analyze SEO
                            </button>
                            <div id="seo-score-container" class="mt-3 hidden">
                                <div class="text-center p-3 bg-slate-800 rounded-lg">
                                    <div id="seo-score-value" class="text-3xl font-bold">--</div>
                                    <div class="text-xs text-slate-400">SEO Score</div>
                                </div>
                            </div>
                        </div>

                        <!-- AI Assistant -->
                        <div class="bg-gradient-to-br from-violet-900/30 to-blue-900/30 rounded-lg p-4 border border-violet-700/30">
                            <h4 class="font-medium text-white mb-4 flex items-center gap-2">
                                <i data-lucide="sparkles" class="w-4 h-4 text-violet-400"></i> AI Assistant
                            </h4>
                            <div class="space-y-3">
                                <input type="text" id="ai-topic" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-violet-500 focus:outline-none" placeholder="Topic (e.g., Risk Management)">
                                <input type="text" id="ai-keywords" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-violet-500 focus:outline-none" placeholder="Keywords">
                                <select id="ai-audience" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-violet-500 focus:outline-none">
                                    <option value="beginner">Beginner Traders</option>
                                    <option value="intermediate">Intermediate Traders</option>
                                    <option value="advanced">Advanced Traders</option>
                                </select>
                                <select id="ai-tone" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-violet-500 focus:outline-none">
                                    <option value="professional">Professional</option>
                                    <option value="conversational">Conversational</option>
                                    <option value="educational">Educational</option>
                                    <option value="motivational">Motivational</option>
                                </select>
                                <button onclick="generateAIBlogContent()" class="w-full bg-violet-600 hover:bg-violet-500 text-white py-2 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                                    <i data-lucide="wand-2" class="w-4 h-4"></i> Generate Content
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="flex justify-end gap-3 p-6 border-t border-slate-800 bg-slate-800/30">
                    <button onclick="closeBlogEditor()" class="px-6 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-slate-800 transition-all">
                        Cancel
                    </button>
                    <button onclick="saveBlogPost('draft')" class="px-6 py-2.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-white font-medium transition-all">
                        Save Draft
                    </button>
                    <button onclick="saveBlogPost('published')" class="px-6 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium transition-all shadow-lg shadow-blue-500/25 flex items-center gap-2">
                        <i data-lucide="send" class="w-4 h-4"></i> Publish
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 shadow-2xl flex items-center gap-3">
            <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
            <span id="toast-message" class="text-sm text-white">Success</span>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'https://pipways-api-nhem.onrender.com';
        let currentUser = null;
        let blogEditor = null;
        let currentEditingPostId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Check for existing token
            const token = localStorage.getItem('token');
            if (token) {
                validateToken(token);
            }
        });

            document.getElementById('tab-login').className = tab === 'login'

                : 'flex-1 py-2 rounded-md text-slate-400 hover:text-white font-medium text-sm transition-all';
            document.getElementById('tab-register').className = tab === 'register'
                ? 'flex-1 py-2 rounded-md bg-blue-500 text-white font-medium text-sm transition-all'
                : 'flex-1 py-2 rounded-md text-slate-400 hover:text-white font-medium text-sm transition-all';
            
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('auth-error').classList.add('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    currentUser = data;
                    showApp();
                } else {
                    showAuthError(data.detail || 'Login failed');
                }
            } catch (error) {
                showAuthError('Network error. Please try again.');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    currentUser = data;
                    showApp();
                } else {
                    showAuthError(data.detail || 'Registration failed');
                }
            } catch (error) {
                showAuthError('Network error. Please try again.');
            }
        }

        function showAuthError(message) {
            const errorEl = document.getElementById('auth-error');

        async function validateToken(token) {
            try {
                const response = await fetch(`${API_BASE}/trades`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    currentUser = { token };
                    showApp();
                } else {
                    localStorage.removeItem('token');
                }
            } catch (error) {
                localStorage.removeItem('token');
            }
        }

        async function editBlogPost(postId) {
            if (!currentUser?.is_admin) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/posts/${postId}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load post');
                
                const post = await response.json();
                
                currentEditingPostId = post.id;
                document.getElementById('editor-modal-title').textContent = 'Edit Post';
                
                // Open editor first
                openBlogEditor();
                
                // Fill in form data
                document.getElementById('blog-title').value = post.title || '';
                document.getElementById('blog-excerpt').value = post.excerpt || '';
                document.getElementById('blog-meta-title').value = post.meta_title || '';
                document.getElementById('blog-meta-desc').value = post.meta_description || '';
                document.getElementById('blog-keyword').value = post.focus_keyword || '';
                document.getElementById('blog-tags').value = post.tags ? post.tags.join(', ') : '';
                document.getElementById('blog-image').value = post.featured_image || '';
                document.getElementById('blog-category').value = post.category || '';
                document.getElementById('blog-status').value = post.status || 'draft';
                
                // Update counters
                updateCharCounters();
                
                // Load content into editor
                if (post.content_json) {
                    await blogEditor.render(post.content_json);
                }
                
            } catch (error) {
                console.error('Error loading post:', error);
                showToast('Error loading post', 'error');
            }
        }

        async function saveBlogPost(status) {
            try {
                const content = await blogEditor.save();
                
                const formData = new FormData();
                formData.append('title', document.getElementById('blog-title').value);
                formData.append('content_json', JSON.stringify(content));
                formData.append('excerpt', document.getElementById('blog-excerpt').value);
                formData.append('meta_title', document.getElementById('blog-meta-title').value);
                formData.append('meta_description', document.getElementById('blog-meta-desc').value);
                formData.append('focus_keyword', document.getElementById('blog-keyword').value);
                formData.append('tags', document.getElementById('blog-tags').value);
                formData.append('featured_image', document.getElementById('blog-image').value);
                formData.append('category', document.getElementById('blog-category').value);
                formData.append('status', status);
                
                const url = currentEditingPostId 
                    ? `${API_BASE}/admin/posts/${currentEditingPostId}` 
                    : `${API_BASE}/admin/posts`;
                const method = currentEditingPostId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    body: formData,
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Post ${currentEditingPostId ? 'updated' : 'created'} successfully!`, 'success');
                    closeBlogEditor();
                    loadBlogPosts();
                } else {
                    showToast(result.error || 'Error saving post', 'error');
                }
            } catch (error) {
                console.error('Error saving post:', error);
                showToast('Error saving post: ' + error.message, 'error');
            }
        }

            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Generating...';
            btn.disabled = true;
            
            try {

                formData.append('topic', document.getElementById('ai-topic').value);
                formData.append('keywords', document.getElementById('ai-keywords').value);
                formData.append('audience', document.getElementById('ai-audience').value);
                formData.append('tone', document.getElementById('ai-tone').value);
                
                const response = await fetch(`${API_BASE}/admin/ai-generate`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const result = await response.json();
                
                if (result.success && result.content) {
                    const content = result.content;
                    
                    // Fill in generated content
                    document.getElementById('blog-title').value = content.title || '';
                    document.getElementById('blog-meta-title').value = content.meta_title || '';
                    document.getElementById('blog-meta-desc').value = content.meta_description || '';
                    document.getElementById('blog-keyword').value = content.focus_keyword || '';
                    document.getElementById('blog-excerpt').value = content.excerpt || '';
                    
                    // Render content blocks
                    if (content.content_blocks) {
                        await blogEditor.render({ blocks: content.content_blocks });
                    }
                    
                    updateCharCounters();
                    showToast('AI content generated! Review before publishing.', 'success');
                } else {
                    showToast('Failed to generate content', 'error');
                }
            } catch (error) {
                console.error('Error generating AI content:', error);
                showToast('Error generating content', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

                    // Color code
                    scoreValue.className = 'text-3xl font-bold ' + 
                        (result.seo_score >= 80 ? 'text-emerald-400' : 
                         result.seo_score >= 60 ? 'text-amber-400' : 'text-red-400');
                }
            } catch (error) {
                console.error('Error analyzing SEO:', error);
                showToast('Error analyzing SEO', 'error');
            }
        }

        function renderAdmin(container) {
            if (!currentUser?.is_admin) {
                container.innerHTML = `
                    <div class="p-8">
                        <div class="glass rounded-xl p-8 text-center">
                            <div class="w-16 h-16 mx-auto mb-4 rounded-lg bg-red-500/20 flex items-center justify-center">
                                <i data-lucide="lock" class="w-8 h-8 text-red-400"></i>
                            </div>
                            <p class="text-red-400">Admin access required</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            container.innerHTML = `
                <div class="p-8">
                    <h2 class="text-3xl font-bold text-white mb-8">Admin Dashboard</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass rounded-xl p-6">
                            <div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center mb-4">
                                <i data-lucide="users" class="w-6 h-6 text-blue-400"></i>
                            </div>
                            <p class="text-slate-400 text-sm">Total Users</p>
                            <p class="text-2xl font-bold text-white">--</p>
                        </div>
                        <div class="glass rounded-xl p-6">
                            <div class="w-12 h-12 rounded-lg bg-violet-500/20 flex items-center justify-center mb-4">
                                <i data-lucide="file-text" class="w-6 h-6 text-violet-400"></i>
                            </div>
                            <p class="text-slate-400 text-sm">Blog Posts</p>
                            <p class="text-2xl font-bold text-white">--</p>
                        </div>
                        <div class="glass rounded-xl p-6">
                            <div class="w-12 h-12 rounded-lg bg-emerald-500/20 flex items-center justify-center mb-4">
                                <i data-lucide="activity" class="w-6 h-6 text-emerald-400"></i>
                            </div>
                            <p class="text-slate-400 text-sm">Active Today</p>
                            <p class="text-2xl font-bold text-white">--</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toastIcon.setAttribute('data-lucide', 'alert-circle');
                toastIcon.classList.remove('text-emerald-400');
                toastIcon.classList.add('text-red-400');
            } else {
                toastIcon.setAttribute('data-lucide', 'check-circle');
                toastIcon.classList.remove('text-red-400');
                toastIcon.classList.add('text-emerald-400');
            }
            
            lucide.createIcons();
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeBlogEditor();
            }
        });
    </script>
</body>
</html>
