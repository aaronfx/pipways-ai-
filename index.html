<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Institutional Trader Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">Pipways</h1>
                <p class="text-xs text-slate-500">Institutional Trader Dev</p>
            </div>
            
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="showPage('dashboard')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-500/10 text-blue-400 border-r-2 border-blue-500">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="showPage('journal')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 transition-colors">
                    <i data-lucide="camera" class="w-5 h-5"></i> Trade Journal
                </button>
                <button onclick="showPage('discipline')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 transition-colors">
                    <i data-lucide="shield-check" class="w-5 h-5"></i> Discipline
                </button>
                <button onclick="showPage('mentor')" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 transition-colors">
                    <i data-lucide="bot" class="w-5 h-5"></i> AI Mentor
                </button>
            </nav>
            
            <div class="p-4 border-t border-slate-800">
                <div class="bg-slate-800 rounded-lg p-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-slate-400">Level 2</span>
                        <span class="text-xs text-blue-400">65%</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-gradient-to-r from-blue-500 to-violet-500 h-2 rounded-full transition-all" style="width: 65%"></div>
                    </div>
                    <p class="text-xs text-slate-500 mt-2">To Level 3</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8" id="content"></main>
    </div>

<script>
    // Data Storage (Local Browser)
    const DB = {
        get: (k, d=[]) => JSON.parse(localStorage.getItem(k)||JSON.stringify(d)),
        set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
        addTrade: (t) => {
            const trades = DB.get('trades');
            trades.unshift({...t, id: Date.now(), date: new Date().toLocaleDateString()});
            DB.set('trades', trades);
            return trades;
        }
    };

    // Initialize sample data
    if(!localStorage.getItem('init')) {
        DB.set('trades', [
            {pair: 'EURUSD', direction: 'LONG', pips: 16, grade: 'A-', date: '1/15/24'},
            {pair: 'GBPUSD', direction: 'SHORT', pips: 17, grade: 'B+', date: '1/14/24'},
            {pair: 'USDJPY', direction: 'LONG', pips: -22, grade: 'C', date: '1/13/24', flags: ['Oversizing']}
        ]);
        localStorage.setItem('init', '1');
    }

    function showPage(page) {
        const content = document.getElementById('content');
        const trades = DB.get('trades');
        const totalPips = trades.reduce((a,b) => a + b.pips, 0);
        const wins = trades.filter(t => t.pips > 0).length;
        const score = 87;

        // Update nav styling
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('bg-blue-500/10', 'text-blue-400', 'border-r-2', 'border-blue-500');
            btn.classList.add('text-slate-400');
        });
        event.target.closest('.nav-btn').classList.add('bg-blue-500/10', 'text-blue-400', 'border-r-2', 'border-blue-500');
        event.target.closest('.nav-btn').classList.remove('text-slate-400');

        if(page === 'dashboard') {
            content.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="glass rounded-xl p-6">
                        <div class="text-slate-400 text-sm mb-1">Discipline Score</div>
                        <div class="text-3xl font-bold text-blue-400">${score}</div>
                        <div class="mt-2 w-full bg-slate-700 rounded-full h-2">
                            <div class="bg-blue-500 h-2 rounded-full" style="width: ${score}%"></div>
                        </div>
                    </div>
                    <div class="glass rounded-xl p-6">
                        <div class="text-slate-400 text-sm mb-1">Win Rate</div>
                        <div class="text-3xl font-bold text-violet-400">${(wins/trades.length*100).toFixed(0)}%</div>
                    </div>
                    <div class="glass rounded-xl p-6">
                        <div class="text-slate-400 text-sm mb-1">Total Pips</div>
                        <div class="text-3xl font-bold ${totalPips>=0?'text-emerald-400':'text-red-400'}">${totalPips>0?'+':''}${totalPips}</div>
                    </div>
                    <div class="glass rounded-xl p-6">
                        <div class="text-slate-400 text-sm mb-1">Trades</div>
                        <div class="text-3xl font-bold text-orange-400">${trades.length}</div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4">Recent Trades</h3>
                    <div class="space-y-3">
                        ${trades.map(t => `
                            <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg">
                                <div class="flex items-center gap-4">
                                    <span class="font-bold">${t.pair}</span>
                                    <span class="px-2 py-1 rounded text-xs ${t.direction==='LONG'?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}">${t.direction}</span>
                                    <span class="font-mono ${t.pips>=0?'text-emerald-400':'text-red-400'}">${t.pips>0?'+':''}${t.pips}</span>
                                </div>
                                <span class="px-2 py-1 rounded bg-slate-700 text-xs font-bold">${t.grade}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } else if(page === 'journal') {
            content.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Trade Journal</h2>
                <div class="glass rounded-xl p-8 mb-6 text-center border-2 border-dashed border-slate-700 hover:border-blue-500/50 transition-colors">
                    <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-blue-500/20 flex items-center justify-center">
                        <i data-lucide="upload-cloud" class="w-8 h-8 text-blue-400"></i>
                    </div>
                    <p class="text-lg mb-4">Log your trade manually</p>
                    <form onsubmit="addTrade(event)" class="max-w-md mx-auto grid grid-cols-2 gap-4 text-left">
                        <input name="pair" placeholder="Pair (EURUSD)" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white" required>
                        <select name="direction" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white">
                            <option>LONG</option><option>SHORT</option>
                        </select>
                        <input name="pips" type="number" placeholder="Pips (+/-)" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white" required>
                        <select name="grade" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white">
                            <option>A</option><option>B</option><option>C</option>
                        </select>
                        <button type="submit" class="col-span-2 bg-blue-500 hover:bg-blue-600 rounded-lg py-2 font-medium transition-colors">Add Trade</button>
                    </form>
                </div>
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4">All Trades</h3>
                    <div class="space-y-3">
                        ${trades.map(t => `
                            <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg">
                                <div class="flex items-center gap-4">
                                    <span class="text-slate-400 text-sm">${t.date}</span>
                                    <span class="font-bold">${t.pair}</span>
                                    <span class="px-2 py-1 rounded text-xs ${t.direction==='LONG'?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}">${t.direction}</span>
                                    <span class="font-mono ${t.pips>=0?'text-emerald-400':'text-red-400'}">${t.pips>0?'+':''}${t.pips}</span>
                                </div>
                                <span class="px-2 py-1 rounded bg-slate-700 text-xs font-bold">${t.grade}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        } else if(page === 'discipline') {
            content.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">Discipline Score</h2>
                <div class="glass rounded-xl p-12 text-center mb-6">
                    <div class="inline-flex items-center justify-center w-32 h-32 rounded-full bg-gradient-to-br from-blue-500/20 to-violet-500/20 border-4 border-blue-500/30 mb-4">
                        <span class="text-5xl font-bold">${score}</span>
                    </div>
                    <p class="text-xl text-slate-300 mb-2">Disciplined Trader</p>
                    <p class="text-slate-500">Top 15% of users</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="glass rounded-xl p-6">
                        <h3 class="font-semibold mb-4">Plan Adherence</h3>
                        <div class="w-full bg-slate-700 rounded-full h-3 mb-2">
                            <div class="bg-emerald-500 h-3 rounded-full" style="width: 92%"></div>
                        </div>
                        <p class="text-sm text-slate-400">92% - Excellent</p>
                    </div>
                    <div class="glass rounded-xl p-6">
                        <h3 class="font-semibold mb-4">Emotional Variance</h3>
                        <div class="w-full bg-slate-700 rounded-full h-3 mb-2">
                            <div class="bg-yellow-500 h-3 rounded-full" style="width: 15%"></div>
                        </div>
                        <p class="text-sm text-slate-400">0.15 - Low variance</p>
                    </div>
                </div>
            `;
        } else if(page === 'mentor') {
            content.innerHTML = `
                <h2 class="text-3xl font-bold mb-6">AI Mentor</h2>
                <div class="glass rounded-xl p-6 h-[calc(100vh-200px)] flex flex-col">
                    <div id="chatHistory" class="flex-1 overflow-y-auto space-y-4 mb-4">
                        <div class="flex gap-3">
                            <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0">
                                <i data-lucide="bot" class="w-4 h-4 text-blue-400"></i>
                            </div>
                            <div class="bg-slate-800 rounded-lg px-4 py-2 max-w-[80%]">
                                <p class="text-sm">Hello! I'm your AI trading mentor. I see you've maintained a 12-day discipline streak. Your plan adherence is at 92% - excellent progress!</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="mentorInput" placeholder="Ask about your trading..." 
                            class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"
                            onkeypress="if(event.key==='Enter') askMentor()">
                        <button onclick="askMentor()" class="px-6 py-2 bg-blue-500 hover:bg-blue-600 rounded-lg transition-colors">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `;
        }
        lucide.createIcons();
    }

    function addTrade(e) {
        e.preventDefault();
        const f = e.target;
        DB.addTrade({
            pair: f.pair.value,
            direction: f.direction.value,
            pips: parseInt(f.pips.value),
            grade: f.grade.value
        });
        showPage('dashboard');
    }

    function askMentor() {
        const input = document.getElementById('mentorInput');
        const message = input.value;
        if(!message) return;
        
        const chat = document.getElementById('chatHistory');
        
        // Add user message
        chat.innerHTML += `
            <div class="flex gap-3 flex-row-reverse">
                <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="user" class="w-4 h-4 text-slate-300"></i>
                </div>
                <div class="bg-blue-600 rounded-lg px-4 py-2 max-w-[80%]">
                    <p class="text-sm">${message}</p>
                </div>
            </div>
        `;
        
        input.value = '';
        
        // Mock AI response
        setTimeout(() => {
            const responses = [
                "Based on your recent trades, focus on maintaining consistent position sizing. Your last 3 trades show good entry timing but varied sizes.",
                "Your win rate is solid at 58%, but your R:R ratio could improve. Consider aiming for 1:2 minimum on all setups.",
                "I notice you tend to trade more aggressively after losses. Consider implementing a mandatory 30-minute break rule."
            ];
            const response = responses[Math.floor(Math.random() * responses.length)];
            
            chat.innerHTML += `
                <div class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center flex-shrink-0">
                        <i data-lucide="bot" class="w-4 h-4 text-blue-400"></i>
                    </div>
                    <div class="bg-slate-800 rounded-lg px-4 py-2 max-w-[80%]">
                        <p class="text-sm">${response}</p>
                    </div>
                </div>
            `;
            lucide.createIcons();
            chat.scrollTop = chat.scrollHeight;
        }, 1000);
    }

    // Load initial page
    showPage('dashboard');
    lucide.createIcons();
</script>
</body>
</html>
