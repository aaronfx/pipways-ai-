<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Institutional Trader Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { 
            font-family: 'Inter', sans-serif; 
        }
        
        .mono { 
            font-family: 'JetBrains Mono', monospace; 
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            color: #60a5fa;
        }
        
        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chart-container {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #0f172a;
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
    
    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">

                </div>
                <h1 class="text-3xl font-bold gradient-text mb-2">Pipways</h1>

                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-primary rounded-lg py-2.5 font-medium text-white shadow-lg">

            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <div>

                    <input type="text" name="name" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="••••••••">

            <div class="mt-6 p-4 bg-slate-800/30 rounded-lg border border-slate-700/50">
                <p class="text-xs text-slate-500 font-medium mb-2 uppercase tracking-wider">Demo Credentials</p>
                <div class="text-xs text-slate-400 space-y-1 font-mono">
                    <p><span class="text-slate-500">Email:</span> admin@pipways.com</p>
                    <p><span class="text-slate-500">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden h-screen flex overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900/50 border-r border-slate-800 flex flex-col backdrop-blur-xl">
            <div class="p-6 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                        <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Pipways</h1>

            </div>

<script>
const API_URL = 'https://pipways-api-nhem.onrender.com';
let authToken = localStorage.getItem('pipways_token');
let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');

if (authToken) {
    showApp();
} else {
    showAuth();
}

function showAuth() {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}

function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    showPage('dashboard');
}

function showAuthTab(tab) {
    const loginBtn = document.getElementById('tab-login');
    const registerBtn = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    if (tab === 'login') {
        loginBtn.classList.add('bg-blue-500', 'text-white');
        loginBtn.classList.remove('text-slate-400');
        registerBtn.classList.remove('bg-blue-500', 'text-white');
        registerBtn.classList.add('text-slate-400');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        registerBtn.classList.add('bg-blue-500', 'text-white');
        registerBtn.classList.remove('text-slate-400');
        loginBtn.classList.remove('bg-blue-500', 'text-white');
        loginBtn.classList.add('text-slate-400');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
    document.getElementById('auth-error').classList.add('hidden');
}

function getErrorMessage(data) {
    if (typeof data === 'string') return data;
    if (data.detail) {
        if (typeof data.detail === 'string') return data.detail;
        if (Array.isArray(data.detail)) {
            return data.detail.map(err => {
                if (typeof err === 'string') return err;
                if (err.msg) return err.msg;
                if (err.message) return err.message;
                return JSON.stringify(err);
            }).join(', ');
        }
        return JSON.stringify(data.detail);
    }
    if (data.message) return data.message;
    if (data.error) return data.error;
    return JSON.stringify(data);
}

async function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        formData.append('name', form.name.value);
        
        const response = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

function logout() {
    localStorage.removeItem('pipways_token');
    localStorage.removeItem('pipways_user');
    authToken = null;
    currentUser = {};
    showAuth();
}

async function apiCall(endpoint, options = {}) {
    const headers = {
        'Authorization': `Bearer ${authToken}`,
        ...options.headers
    };
    
    const response = await fetch(`${API_URL}${endpoint}`, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Session expired. Please login again.');
    }
    
    return response;
}

async function showPage(page) {
    const content = document.getElementById('content');
    
    // Update sidebar active state
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    if (event && event.target) {
        event.target.closest('.nav-btn').classList.add('active');
    } else {
        // Default to dashboard if no event
        document.querySelector(`[onclick="showPage('${page}')"]`)?.classList.add('active');
    }

    if (page === 'dashboard') {
        await renderDashboard(content);
    } else if (page === 'journal') {
        renderJournal(content);
    } else if (page === 'analysis') {
        renderChartAnalysis(content);
    } else if (page === 'discipline') {
        renderDiscipline(content);
    } else if (page === 'mentor') {
        renderMentor(content);
    }
    lucide.createIcons();
}

async function renderDashboard(content) {
    try {
        const response = await apiCall('/trades');
        const trades = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(trades));
        }
        
        const totalPips = trades.reduce((a, b) => a + (b.pips || 0), 0);
        const wins = trades.filter(t => t.pips > 0).length;
        const winRate = trades.length ? (wins / trades.length * 100).toFixed(0) : 0;
        const avgPips = trades.length ? (totalPips / trades.length).toFixed(1) : 0;
        
        content.innerHTML = `

                            </div>
                            <span class="text-xs font-medium text-emerald-400 flex items-center gap-1">
                                <i data-lucide="trending-up" class="w-3 h-3"></i> +12%
                            </span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Discipline Score</div>
                        <div class="text-3xl font-bold text-white">87<span class="text-lg text-slate-500">/100</span></div>
                    </div>
                    
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg bg-violet-500/20 flex items-center justify-center">
                                <i data-lucide="target" class="w-6 h-6 text-violet-400"></i>
                            </div>
                            <span class="text-xs font-medium text-slate-500">All time</span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Win Rate</div>
                        <div class="text-3xl font-bold text-white">${winRate}<span class="text-lg text-slate-500">%</span></div>
                    </div>
                    
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg ${totalPips >= 0 ? 'bg-emerald-500/20' : 'bg-red-500/20'} flex items-center justify-center">
                                <i data-lucide="activity" class="w-6 h-6 ${totalPips >= 0 ? 'text-emerald-400' : 'text-red-400'}"></i>
                            </div>
                            <span class="text-xs font-medium text-slate-500">Total</span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Total Pips</div>
                        <div class="text-3xl font-bold ${totalPips >= 0 ? 'text-emerald-400' : 'text-red-400'}">
                            ${totalPips > 0 ? '+' : ''}${totalPips}
                        </div>
                    </div>
                    
                    <div class="metric-card rounded-xl p-6 card-hover">
                        <div class="flex items-center justify-between mb-4">
                            <div class="w-12 h-12 rounded-lg bg-orange-500/20 flex items-center justify-center">
                                <i data-lucide="bar-chart-2" class="w-6 h-6 text-orange-400"></i>
                            </div>
                            <span class="text-xs font-medium text-slate-500">This month</span>
                        </div>
                        <div class="text-slate-400 text-sm mb-1">Total Trades</div>
                        <div class="text-3xl font-bold text-white">${trades.length}</div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass rounded-xl p-6">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="text-lg font-semibold text-white">Recent Trades</h3>
                            <button onclick="showPage('journal')" class="text-sm text-blue-400 hover:text-blue-300 font-medium">View All</button>
                        </div>
                        <div class="space-y-3">
                            ${trades.slice(0, 5).map(t => `

                        <div class="space-y-3">
                            <button onclick="showPage('analysis')" class="w-full p-4 bg-slate-800/50 rounded-lg border border-slate-700/50 hover:border-blue-500/50 hover:bg-slate-800 transition-all text-left group">

async function analyzeChart(input) {

    resultDiv.classList.add('hidden');
    
    try {
        const formData = new FormData();
        formData.append('file', file);
        
        const response = await apiCall('/analyze-chart', {
            method: 'POST',
            body: formData

async function addTrade(e) {
    e.preventDefault();
    const f = e.target;
    const btn = f.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    
    btn.innerHTML = '<div class="loading-spinner w-5 h-5 border-2"></div> Saving...';
    btn.disabled = true;
    
    try {
        const formData = new URLSearchParams();
        formData.append('pair', f.pair.value.toUpperCase());
        formData.append('direction', f.direction.value);
        formData.append('pips', f.pips.value);
        formData.append('grade', f.grade.value);
        if (f.entry_price.value) formData.append('entry_price', f.entry_price.value);
        if (f.exit_price.value) formData.append('exit_price', f.exit_price.value);
        
        const response = await apiCall('/trades', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        // Show success and redirect to dashboard
        btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Saved!';
        btn.classList.remove('bg-emerald-500');
        btn.classList.add('bg-emerald-600');
        
        setTimeout(() => {
            showPage('dashboard');
        }, 1000);
        
    } catch (err) {
        btn.innerHTML = originalText;
        btn.disabled = false;
        alert('Error: ' + err.message);
    }
}

async function askMentor() {
    const input = document.getElementById('mentorInput');
    const message = input.value.trim();
    if (!message) return;
    
    const chat = document.getElementById('chatHistory');
    
    // Add user message
    chat.innerHTML += `
        <div class="flex gap-3 flex-row-reverse">
            <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center flex-shrink-0">
                <i data-lucide="user" class="w-5 h-5 text-slate-300"></i>
            </div>
            <div class="bg-blue-600 rounded-2xl rounded-tr-sm px-5 py-3 max-w-[80%]">
                <p class="text-white text-sm leading-relaxed">${message}</p>
            </div>
        </div>
    `;
    
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    lucide.createIcons();
    
    // Show typing indicator
    const typingId = 'typing-' + Date.now();
    chat.innerHTML += `
        <div id="${typingId}" class="flex gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                <i data-lucide="bot" class="w-5 h-5 text-white"></i>
            </div>
            <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-5 py-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </div>
    `;
    chat.scrollTop = chat.scrollHeight;
    
    try {
        const response = await apiCall(`/mentor-chat?message=${encodeURIComponent(message)}`);
        const data = await response.json();
        
        // Remove typing indicator
        document.getElementById(typingId).remove();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        chat.innerHTML += `
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                </div>
                <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%]">
                    <p class="text-slate-200 text-sm leading-relaxed">${data.response}</p>
                    ${data.fallback ? '<span class="text-xs text-slate-600 mt-2 block">Offline mode</span>' : ''}
                </div>
            </div>
        `;
        
    } catch (err) {
        document.getElementById(typingId).remove();
        chat.innerHTML += `
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-400"></i>
                </div>
                <div class="bg-red-500/10 border border-red-500/20 rounded-2xl rounded-tl-sm px-5 py-3 max-w-[80%]">
                    <p class="text-red-400 text-sm">Sorry, I'm having trouble connecting. Please try again.</p>
                </div>
            </div>
        `;
    }
    
    lucide.createIcons();
    chat.scrollTop = chat.scrollHeight;
}
