<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pipways - Institutional Trader Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Editor.js and plugins -->
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/paragraph@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/image@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/code@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/embed@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.5);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }
        
        .nav-btn.active {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        
        /* Editor.js Custom Styling */
        .codex-editor {
            background: #1e293b;
            border-radius: 0.5rem;
            min-height: 300px;
        }
        
        .ce-block__content, .ce-toolbar__content {
            max-width: 100%;
        }
        
        .ce-toolbar__actions {
            right: 10px;
        }
        
        .ce-block--selected .ce-block__content {
            background: #334155;
        }
        
        .ce-inline-toolbar {
            background: #1e293b;
            border-color: #334155;
        }
        
        .ce-conversion-tool__icon, .ce-popover__item-icon {
            background: #334155;
        }
        
        .ce-popover, .ce-settings {
            background: #1e293b;
            border-color: #334155;
            color: #e2e8f0;
        }
        
        .cdx-search-field {
            border-color: #334155;
        }
        
        .ce-popover__item:hover, .ce-conversion-tool:hover {
            background: #334155;
        }
        
        .cdx-button {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }
        
        .cdx-button:hover {
            background: #475569;
        }
        
        .ce-header {
            color: #f8fafc;
        }
        
        .codex-editor__redactor {
            padding-bottom: 100px !important;
        }
        
        .ce-paragraph {
            color: #e2e8f0;
        }
        
        .cdx-list {
            color: #e2e8f0;
        }
        
        .cdx-quote__text {
            color: #e2e8f0;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Mobile optimizations */
        @media (max-width: 1024px) {
            .ce-toolbar__actions {
                right: 5px;
            }
            
            .ce-popover {
                max-width: 280px;
            }
        }
        
        /* Touch-friendly buttons */
        button, select, input, textarea {
            touch-action: manipulation;
        }
        
        /* Prevent zoom on input focus for iOS */
        @media screen and (max-width: 768px) {
            input, select, textarea {
                font-size: 16px;
            }
        }
        
        /* Modal animation */
        .modal-enter {
            animation: modalFadeIn 0.3s ease;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Slide-in animation for mobile menu */
        .slide-in {
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }
        
        /* Loading shimmer */
        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 antialiased overflow-x-hidden">
    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
        <div class="glass-strong rounded-2xl p-6 md:p-8 w-full max-w-md shadow-2xl mx-4">
            <div class="text-center mb-6 md:mb-8">
                <div class="w-14 h-14 md:w-16 md:h-16 mx-auto mb-4 rounded-xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-7 h-7 md:w-8 md:h-8 text-white"></i>
                </div>
                <h1 class="text-2xl md:text-3xl font-bold gradient-text mb-2">Pipways</h1>
                <p class="text-slate-400 text-sm md:text-base">Institutional Trader Development</p>
            </div>
            
            <div id="auth-tabs" class="flex gap-2 mb-6 p-1 bg-slate-800/50 rounded-lg">
                <button onclick="showAuthTab('login')" id="tab-login" class="flex-1 py-2.5 rounded-md bg-blue-500 text-white font-medium text-sm transition-all">Sign In</button>
                <button onclick="showAuthTab('register')" id="tab-register" class="flex-1 py-2.5 rounded-md text-slate-400 hover:text-white font-medium text-sm transition-all">Register</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="admin@pipways.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-primary rounded-lg py-3 font-medium text-white shadow-lg">
                    Sign In
                </button>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Full Name</label>
                    <input type="text" name="name" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="john@example.com">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all" placeholder="••••••••">
                    <p class="text-xs text-slate-500 mt-1">Max 72 characters</p>
                </div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 rounded-lg py-3 font-medium text-white shadow-lg transition-all">
                    Create Account
                </button>
            </form>
            
            <div id="auth-error" class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm hidden"></div>
            
            <div class="mt-6 p-4 bg-slate-800/30 rounded-lg border border-slate-700/50">
                <p class="text-xs text-slate-500 font-medium mb-2 uppercase tracking-wider">Demo Credentials</p>
                <div class="text-xs text-slate-400 space-y-1 font-mono">
                    <p><span class="text-slate-500">Email:</span> admin@pipways.com</p>
                    <p><span class="text-slate-500">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden h-screen flex flex-col md:flex-row overflow-hidden">
        <!-- Mobile Header -->
        <div class="md:hidden flex items-center justify-between p-4 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 z-40">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-4 h-4 text-white"></i>
                </div>
                <span class="font-bold text-white">Pipways</span>
            </div>
            <button onclick="toggleMobileMenu()" class="p-2 text-slate-400 hover:text-white">
                <i data-lucide="menu" class="w-6 h-6" id="mobile-menu-icon"></i>
            </button>
        </div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 bg-slate-900/95 md:bg-slate-900/50 border-r border-slate-800 flex flex-col backdrop-blur-xl z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
            <div class="p-4 md:p-6 border-b border-slate-800 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                        <i data-lucide="trending-up" class="w-4 h-4 md:w-5 md:h-5 text-white"></i>
                    </div>
                    <div class="hidden md:block">
                        <h1 class="text-lg md:text-xl font-bold text-white">Pipways</h1>
                        <p class="text-xs text-slate-500">Institutional Trader</p>
                    </div>
                </div>
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 text-slate-400 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <button onclick="showPage('dashboard')" class="nav-btn sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    <span>Dashboard</span>
                </button>
                <button onclick="showPage('journal')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="book-open" class="w-5 h-5"></i>
                    <span>Trade Journal</span>
                </button>
                <button onclick="showPage('analysis')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="scan-eye" class="w-5 h-5"></i>
                    <span>Chart Analysis</span>
                </button>
                <button onclick="showPage('trade-analysis')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="file-bar-chart" class="w-5 h-5"></i>
                    <span>Trade Analysis</span>
                </button>
                <button onclick="showPage('discipline')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                    <span>Discipline</span>
                </button>
                <button onclick="showPage('mentor')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="bot" class="w-5 h-5"></i>
                    <span>AI Mentor</span>
                </button>
                <button onclick="showPage('blog')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="newspaper" class="w-5 h-5"></i>
                    <span>Blog</span>
                </button>
                <button onclick="window.open('/webinars', '_blank')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300">
                    <i data-lucide="video" class="w-5 h-5"></i>
                    <span>Webinars</span>
                </button>
                <button onclick="showPage('admin')" class="nav-btn sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-slate-300 hidden" id="admin-nav">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span>Admin</span>
                </button>
            </nav>
            
            <div class="p-4 border-t border-slate-800 space-y-3">
                <div class="bg-slate-800/50 rounded-lg p-3 md:p-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs font-medium text-slate-400">Level 2</span>
                        <span class="text-xs font-bold text-blue-400">65%</span>
                    </div>
                    <div class="w-full bg-slate-700 rounded-full h-2">
                        <div class="bg-gradient-to-r from-blue-500 to-violet-500 h-2 rounded-full transition-all" style="width: 65%"></div>
                    </div>
                </div>
                <button onclick="logout()" class="w-full flex items-center gap-2 px-4 py-2.5 rounded-lg text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- Overlay for mobile menu -->
        <div id="mobile-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 hidden md:hidden"></div>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-gradient-to-br from-slate-950 to-slate-900 w-full" id="content"></main>
    </div>

    <!-- Blog Editor Modal -->
    <div id="blog-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-50 overflow-y-auto">
        <div class="min-h-screen px-4 py-4 md:py-8">
            <div class="max-w-6xl mx-auto bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden modal-enter">
                <!-- Header -->
                <div class="flex justify-between items-center p-4 md:p-6 border-b border-slate-800 bg-slate-800/50">
                    <h3 class="text-lg md:text-xl font-bold text-white flex items-center gap-2" id="modal-title">
                        <i data-lucide="file-text" class="w-5 h-5 text-blue-400"></i>
                        <span>New Blog Post</span>
                    </h3>
                    <button onclick="closeBlogEditor()" class="text-slate-400 hover:text-white transition-colors p-2 hover:bg-slate-800 rounded-lg">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <!-- Body -->
                <div class="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
                    <!-- Main Content -->
                    <div class="lg:col-span-2 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Title</label>
                            <input type="text" id="blog-title" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none text-lg" placeholder="Post title">
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Category</label>
                                <select id="blog-category" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none">
                                    <option value="Strategy">Strategy</option>
                                    <option value="Psychology">Psychology</option>
                                    <option value="Risk Management">Risk Management</option>
                                    <option value="Technical Analysis">Technical Analysis</option>
                                    <option value="Beginner Guides">Beginner Guides</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-2">Status</label>
                                <select id="blog-status" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white focus:border-blue-500 focus:outline-none">
                                    <option value="draft">Draft</option>
                                    <option value="published">Published</option>
                                    <option value="scheduled">Scheduled</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Content</label>
                            <div id="editorjs" class="bg-slate-800 border border-slate-700 rounded-lg min-h-[300px] md:min-h-[400px]"></div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-2">Excerpt</label>
                            <textarea id="blog-excerpt" rows="3" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-white focus:border-blue-500 focus:outline-none resize-none" placeholder="Brief summary of the post"></textarea>
                        </div>
                    </div>
                    
                    <!-- Sidebar -->
                    <div class="space-y-4">
                        <!-- SEO -->
                        <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700">
                            <h4 class="font-medium text-white mb-4 flex items-center gap-2">
                                <i data-lucide="search" class="w-4 h-4 text-slate-400"></i> SEO
                            </h4>
                            <div class="space-y-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Meta Title (<span id="meta-title-count">0</span>/70)</label>
                                    <input type="text" id="blog-meta-title" maxlength="70" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="SEO title...">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Meta Description (<span id="meta-desc-count">0</span>/160)</label>
                                    <textarea id="blog-meta-desc" maxlength="160" rows="2" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none resize-none" placeholder="SEO description..."></textarea>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Focus Keyword</label>
                                    <input type="text" id="blog-keyword" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="Primary keyword">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Tags (comma separated)</label>
                                    <input type="text" id="blog-tags" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="forex, trading, psychology">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-400 mb-1">Featured Image URL</label>
                                    <input type="text" id="blog-image" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 focus:outline-none" placeholder="https://...">
                                </div>
                            </div>
                            <button onclick="analyzeBlogSEO()" class="w-full mt-3 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-sm font-medium transition-all flex items-center justify-center gap-2">
                                <i data-lucide="bar-chart-2" class="w-4 h-4"></i> Analyze SEO
                            </button>
                            <div id="seo-score-container" class="mt-3 hidden">
                                <div class="text-center p-3 bg-slate-800 rounded-lg">
                                    <div id="seo-score-value" class="text-3xl font-bold">--</div>
                                    <div class="text-xs text-slate-400">SEO Score</div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- AI Assistant -->
                        <div class="bg-gradient-to-br from-violet-900/30 to-blue-900/30 rounded-lg p-4 border border-violet-700/30">
                            <h4 class="font-medium text-white mb-4 flex items-center gap-2">
                                <i data-lucide="sparkles" class="w-4 h-4 text-violet-400"></i> AI Assistant
                            </h4>
                            <div class="space-y-3">
                                <input type="text" id="ai-topic" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-violet-500 focus:outline-none" placeholder="Topic (e.g., Risk Management)">
                                <input type="text" id="ai-keywords" class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:border-violet-500 focus:outline-none" placeholder="Keywords">

        // Initialize

            // Check for existing token
            const token = localStorage.getItem('token');
            if (token) {
                validateToken(token);
            }
            
            // Setup character counters
            document.getElementById('blog-meta-title')?.addEventListener('input', updateCharCounters);
            document.getElementById('blog-meta-desc')?.addEventListener('input', updateCharCounters);
            
            // Close modal on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeBlogEditor();

            });

        // Mobile Menu Toggle
        function toggleMobileMenu() {
            mobileMenuOpen = !mobileMenuOpen;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            const icon = document.getElementById('mobile-menu-icon');
            
            if (mobileMenuOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                icon.setAttribute('data-lucide', 'x');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                icon.setAttribute('data-lucide', 'menu');
            }
            lucide.createIcons();
        }

        // Auth Functions
        function showAuthTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const registerBtn = document.getElementById('tab-register');
            
            if (tab === 'login') {
                loginBtn.className = 'flex-1 py-2.5 rounded-md bg-blue-500 text-white font-medium text-sm transition-all';
                registerBtn.className = 'flex-1 py-2.5 rounded-md text-slate-400 hover:text-white font-medium text-sm transition-all';
            } else {
                loginBtn.className = 'flex-1 py-2.5 rounded-md text-slate-400 hover:text-white font-medium text-sm transition-all';
                registerBtn.className = 'flex-1 py-2.5 rounded-md bg-blue-500 text-white font-medium text-sm transition-all';
            }
            
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('auth-error').classList.add('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    currentUser = data;
                    showApp();
                } else {
                    showAuthError(data.detail || 'Login failed');
                }
            } catch (error) {
                showAuthError('Network error. Please try again.');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    currentUser = data;
                    showApp();
                } else {
                    showAuthError(data.detail || 'Registration failed');
                }
            } catch (error) {
                showAuthError('Network error. Please try again.');
            }
        }

        function showAuthError(message) {
            const errorEl = document.getElementById('auth-error');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        async function validateToken(token) {
            try {
                const response = await fetch(`${API_BASE}/trades`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    currentUser = { token };
                    showApp();
                } else {
                    localStorage.removeItem('token');
                }
            } catch (error) {
                localStorage.removeItem('token');
            }
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            if (currentUser?.is_admin) {
                document.getElementById('admin-nav').classList.remove('hidden');
            }
            
            showPage('dashboard');
        }

        function logout() {
            localStorage.removeItem('token');
            currentUser = null;
            document.getElementById('app').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('login-form').reset();
            document.getElementById('register-form').reset();
            showAuthTab('login');
            
            // Reset mobile menu
            if (mobileMenuOpen) toggleMobileMenu();
        }

        // Navigation
        function showPage(page) {
            // Close mobile menu if open
            if (mobileMenuOpen) toggleMobileMenu();
            
            // Update nav active state
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (event?.target?.closest('.nav-btn')) {
                event.target.closest('.nav-btn').classList.add('active');
            }
            
            const content = document.getElementById('content');
            
            switch(page) {
                case 'dashboard':
                    renderDashboard(content);
                    break;
                case 'journal':
                    renderJournal(content);
                    break;
                case 'analysis':
                    renderAnalysis(content);
                    break;
                case 'trade-analysis':
                    renderTradeAnalysis(content);
                    break;
                case 'discipline':

                    break;
                case 'mentor':
                    renderMentor(content);
                    break;
                case 'blog':
                    renderBlog(content);
                    break;
                case 'admin':
                    renderAdmin(content);
                    break;

            lucide.createIcons();

                        </div>
                        <div class="glass rounded-xl p-4 md:p-6">
                            <p class="text-slate-400 text-xs md:text-sm mb-1">Avg Trader Score</p>
                            <p class="text-2xl md:text-3xl font-bold text-white" id="stat-score">-</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 md:gap-6">
                        <div class="glass rounded-xl p-4 md:p-6">
                            <h3 class="text-base md:text-lg font-semibold text-white mb-4">Content Management</h3>
                            <div class="space-y-2 md:space-y-3">
                                <button onclick="openBlogEditor()" class="w-full flex items-center gap-3 p-3 md:p-4 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all text-left">
                                    <i data-lucide="file-plus" class="w-4 h-4 md:w-5 md:h-5 text-blue-400 flex-shrink-0"></i>
                                    <span class="text-white text-sm md:text-base">New Blog Post</span>
                                </button>
                                <button onclick="showPage('blog')" class="w-full flex items-center gap-3 p-3 md:p-4 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all text-left">
                                    <i data-lucide="image" class="w-4 h-4 md:w-5 md:h-5 text-violet-400 flex-shrink-0"></i>
                                    <span class="text-white text-sm md:text-base">Media Library</span>
                                </button>
                                <button onclick="showPage('blog')" class="w-full flex items-center gap-3 p-3 md:p-4 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all text-left">
                                    <i data-lucide="list" class="w-4 h-4 md:w-5 md:h-5 text-emerald-400 flex-shrink-0"></i>
                                    <span class="text-white text-sm md:text-base">Manage Posts</span>
                                </button>
                                <button onclick="window.open('/webinars', '_blank')" class="w-full flex items-center gap-3 p-3 md:p-4 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all text-left">
                                    <i data-lucide="video" class="w-4 h-4 md:w-5 md:h-5 text-amber-400 flex-shrink-0"></i>
                                    <span class="text-white text-sm md:text-base">Webinars Dashboard</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="glass rounded-xl p-4 md:p-6">
                            <h3 class="text-base md:text-lg font-semibold text-white mb-4">User Management</h3>
                            <div class="space-y-2 md:space-y-3">
                                <button class="w-full flex items-center gap-3 p-3 md:p-4 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all text-left">
                                    <i data-lucide="users" class="w-4 h-4 md:w-5 md:h-5 text-blue-400 flex-shrink-0"></i>
                                    <span class="text-white text-sm md:text-base">All Users</span>
                                </button>
                                <button class="w-full flex items-center gap-3 p-3 md:p-4 bg-slate-800/50 hover:bg-slate-800 rounded-lg transition-all text-left">
                                    <i data-lucide="bar-chart-2" class="w-4 h-4 md:w-5 md:h-5 text-violet-400 flex-shrink-0"></i>
                                    <span class="text-white text-sm md:text-base">Analytics</span>
                                </button>
                            </div>
                        </div>
                        
                        <div class="glass rounded-xl p-4 md:p-6">
                            <h3 class="text-base md:text-lg font-semibold text-white mb-4">Recent Activity</h3>
                            <div id="recent-activity" class="text-slate-400 text-sm">Loading...</div>
                        </div>
                    </div>
                </div>
            `;
            
            loadAdminStats();
            lucide.createIcons();
        }

        async function loadAdminStats() {
            try {
                const response = await fetch(`${API_BASE}/admin/dashboard`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                
                const usersEl = document.getElementById('stat-users');
                const tradesEl = document.getElementById('stat-trades');
                const postsEl = document.getElementById('stat-posts');
                const scoreEl = document.getElementById('stat-score');
                
                if (usersEl) usersEl.textContent = data.users?.total_users || 0;
                if (tradesEl) tradesEl.textContent = data.trades?.total_trades || 0;
                if (postsEl) postsEl.textContent = data.blog?.total_posts || 0;
                if (scoreEl) scoreEl.textContent = data.analyses?.avg_trader_score ? 
                    Math.round(data.analyses.avg_trader_score) + '/100' : '-';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Blog Editor Functions
        function openBlogEditor(postId = null) {
            currentEditingPostId = postId;
            
            document.getElementById('modal-title').innerHTML = `
                <i data-lucide="file-text" class="w-5 h-5 text-blue-400"></i>
                <span>${postId ? 'Edit Blog Post' : 'New Blog Post'}</span>
            `;
            
            const modal = document.getElementById('blog-modal');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            resetBlogForm();
            
            if (!blogEditor) {
                blogEditor = new EditorJS({
                    holder: 'editorjs',
                    tools: {
                        header: {
                            class: Header,
                            config: { levels: [1, 2, 3, 4, 5, 6], defaultLevel: 2 }
                        },
                        list: { class: List, inlineToolbar: true },
                        paragraph: { class: Paragraph, inlineToolbar: true },
                        image: {
                            class: ImageTool,
                            config: {
                                endpoints: {
                                    byFile: `${API_BASE}/upload`,
                                    byUrl: `${API_BASE}/upload-url`
                                }
                            }
                        },
                        quote: { class: Quote, inlineToolbar: true },
                        code: { class: CodeTool },
                        table: { class: Table, inlineToolbar: true },
                        embed: {
                            class: Embed,
                            config: { services: { youtube: true, twitter: true } }
                        },
                        delimiter: Delimiter
                    },
                    placeholder: 'Write your post content here... Click + to add headings, lists, images, and more',
                    autofocus: true
                });
            }
            
            if (postId) {
                loadPostForEdit(postId);
            }
            
            lucide.createIcons();
        }

        function closeBlogEditor() {
            const modal = document.getElementById('blog-modal');
            modal.classList.add('hidden');
            document.body.style.overflow = '';
            resetBlogForm();
            currentEditingPostId = null;
        }

        function resetBlogForm() {
            document.getElementById('blog-title').value = '';
            document.getElementById('blog-category').value = 'Strategy';
            document.getElementById('blog-status').value = 'draft';
            document.getElementById('blog-excerpt').value = '';
            document.getElementById('blog-meta-title').value = '';
            document.getElementById('blog-meta-desc').value = '';
            document.getElementById('blog-keyword').value = '';
            document.getElementById('blog-tags').value = '';
            document.getElementById('blog-image').value = '';
            document.getElementById('ai-topic').value = '';
            document.getElementById('ai-keywords').value = '';
            document.getElementById('seo-score-container')?.classList.add('hidden');
            
            updateCharCounters();
            
            if (blogEditor) {
                blogEditor.clear();
            }
        }

        async function loadPostForEdit(postId) {
            try {
                const response = await fetch(`${API_BASE}/admin/posts/${postId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const post = await response.json();
                
                document.getElementById('blog-title').value = post.title || '';
                document.getElementById('blog-category').value = post.category || 'Strategy';
                document.getElementById('blog-status').value = post.status || 'draft';
                document.getElementById('blog-excerpt').value = post.excerpt || '';
                document.getElementById('blog-meta-title').value = post.meta_title || '';
                document.getElementById('blog-meta-desc').value = post.meta_description || '';
                document.getElementById('blog-keyword').value = post.focus_keyword || '';
                document.getElementById('blog-tags').value = post.tags ? post.tags.join(', ') : '';
                document.getElementById('blog-image').value = post.featured_image || '';
                
                updateCharCounters();
                
                if (post.content_json) {
                    await blogEditor.render(post.content_json);
                }
            } catch (error) {
                console.error('Error loading post:', error);
                showToast('Error loading post', 'error');
            }
        }

        function updateCharCounters() {
            const titleEl = document.getElementById('blog-meta-title');
            const descEl = document.getElementById('blog-meta-desc');
            
            if (titleEl) {
                document.getElementById('meta-title-count').textContent = titleEl.value.length;
            }
            if (descEl) {
                document.getElementById('meta-desc-count').textContent = descEl.value.length;
            }
        }

        async function saveBlogPost(status) {
            try {
                const content = await blogEditor.save();
                
                const formData = new FormData();
                formData.append('title', document.getElementById('blog-title').value);
                formData.append('content_json', JSON.stringify(content));
                formData.append('excerpt', document.getElementById('blog-excerpt').value);
                formData.append('meta_title', document.getElementById('blog-meta-title').value);
                formData.append('meta_description', document.getElementById('blog-meta-desc').value);
                formData.append('focus_keyword', document.getElementById('blog-keyword').value);
                formData.append('tags', document.getElementById('blog-tags').value);
                formData.append('featured_image', document.getElementById('blog-image').value);
                formData.append('category', document.getElementById('blog-category').value);
                formData.append('status', status);
                
                const url = currentEditingPostId 
                    ? `${API_BASE}/admin/posts/${currentEditingPostId}`
                    : `${API_BASE}/admin/posts`;
                const method = currentEditingPostId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    body: formData,
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Post ${currentEditingPostId ? 'updated' : 'created'} successfully!`, 'success');
                    closeBlogEditor();
                } else {
                    showToast(result.error || 'Error saving post', 'error');
                }
            } catch (error) {
                console.error('Error saving post:', error);
                showToast('Error saving post: ' + error.message, 'error');
            }
        }

        async function generateAIBlogContent() {
            const btn = event.target;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Generating...';
            btn.disabled = true;
            
            try {
                const formData = new FormData();
                formData.append('topic', document.getElementById('ai-topic').value);
                formData.append('keywords', document.getElementById('ai-keywords').value);
                formData.append('audience', document.getElementById('ai-audience').value);
                formData.append('tone', document.getElementById('ai-tone').value);
                
                const response = await fetch(`${API_BASE}/admin/ai-generate`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const result = await response.json();
                
                if (result.success && result.content) {
                    const content = result.content;
                    document.getElementById('blog-title').value = content.title || '';
                    document.getElementById('blog-meta-title').value = content.meta_title || '';
                    document.getElementById('blog-meta-desc').value = content.meta_description || '';
                    document.getElementById('blog-keyword').value = content.focus_keyword || '';
                    document.getElementById('blog-excerpt').value = content.excerpt || '';
                    
                    if (content.content_blocks) {
                        await blogEditor.render({ blocks: content.content_blocks });
                    }
                    
                    updateCharCounters();
                    showToast('AI content generated! Review before publishing.', 'success');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error generating content', 'error');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        async function analyzeBlogSEO() {
            try {
                const content = await blogEditor.save();
                
                const formData = new FormData();
                formData.append('content_json', JSON.stringify(content));
                formData.append('title', document.getElementById('blog-title').value);
                formData.append('meta_description', document.getElementById('blog-meta-desc').value);
                formData.append('focus_keyword', document.getElementById('blog-keyword').value);
                
                const response = await fetch(`${API_BASE}/admin/analyze-seo`, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const container = document.getElementById('seo-score-container');
                    const value = document.getElementById('seo-score-value');
                    
                    container.classList.remove('hidden');
                    value.textContent = result.seo_score;
                    value.className = 'text-3xl font-bold ' + 
                        (result.seo_score >= 80 ? 'text-emerald-400' : 
                         result.seo_score >= 60 ? 'text-amber-400' : 'text-red-400');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error analyzing SEO', 'error');
            }
        }

        // Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMessage.textContent = message;
            
            if (type === 'error') {
                toastIcon.setAttribute('data-lucide', 'alert-circle');
                toastIcon.classList.remove('text-emerald-400');
                toastIcon.classList.add('text-red-400');
            } else {
                toastIcon.setAttribute('data-lucide', 'check-circle');
                toastIcon.classList.remove('text-red-400');
                toastIcon.classList.add('text-emerald-400');
            }
            
            lucide.createIcons();
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
