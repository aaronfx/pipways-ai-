<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Pipways - Professional Forex Trading Journal & Analytics">
    <title>Pipways - Forex Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-strong { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #6366f1); transition: all 0.2s ease; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.2); border-right: 3px solid #3b82f6; }
        @media (max-width: 1024px) { .hide-mobile { display: none !important; } }
        @media (min-width: 1025px) { .hide-desktop { display: none !important; } }
    </style>
<base target="_blank">
</head>
<body class="min-h-screen">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md glass rounded-2xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 mx-auto mb-4 rounded-xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                    <i data-lucide="trending-up" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-3xl font-bold gradient-text mb-2">Pipways</h1>
                <p class="text-slate-400">Master Your Trading Journey</p>
            </div>
            <div class="flex mb-6 bg-slate-800/50 rounded-lg p-1">
                <button id="login-tab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium bg-blue-600 text-white" onclick="switchAuthTab('login')">Login</button>
                <button id="register-tab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium text-slate-400" onclick="switchAuthTab('register')">Register</button>
            </div>
            <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">
                <div><label class="block text-sm text-slate-400 mb-1">Email</label>
                <input type="email" id="login-email" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" placeholder="your@email.com" required></div>
                <div><label class="block text-sm text-slate-400 mb-1">Password</label>
                <input type="password" id="login-password" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" placeholder="••••••••" required></div>
                <button type="submit" class="w-full btn-primary py-3 rounded-lg font-medium">Sign In</button>
            </form>
            <form id="register-form" class="space-y-4 hidden" onsubmit="handleRegister(event)">
                <div><label class="block text-sm text-slate-400 mb-1">Full Name</label>
                <input type="text" id="register-name" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" placeholder="John Doe" required></div>
                <div><label class="block text-sm text-slate-400 mb-1">Email</label>
                <input type="email" id="register-email" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" placeholder="your@email.com" required></div>
                <div><label class="block text-sm text-slate-400 mb-1">Password</label>
                <input type="password" id="register-password" class="w-full px-4 py-3 rounded-lg bg-slate-800 border border-slate-700" placeholder="••••••••" required></div>
                <button type="submit" class="w-full btn-primary py-3 rounded-lg font-medium">Create Account</button>
            </form>
            <div class="mt-6 p-4 bg-slate-800/30 rounded-lg">
                <p class="text-xs text-slate-500 mb-2">Demo Credentials</p>
                <p class="text-xs text-slate-400">Email: admin@pipways.com</p>
                <p class="text-xs text-slate-400">Password: admin123</p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden">
        <!-- Desktop Sidebar -->
        <aside class="hide-mobile w-64 glass-strong h-screen fixed left-0 top-0 z-40">
            <div class="p-6 border-b border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
                        <i data-lucide="trending-up" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-xl font-bold gradient-text">Pipways</span>
                </div>
            </div>
            <nav class="p-4 space-y-1">
                <button onclick="navigateTo('dashboard')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Dashboard</span>
                </button>
                <button onclick="navigateTo('journal')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="book-open" class="w-5 h-5"></i><span>Trade Journal</span>
                </button>
                <button onclick="navigateTo('analytics')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i><span>Analytics</span>
                </button>
                <button onclick="navigateTo('performance')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="target" class="w-5 h-5"></i><span>AI Performance</span>
                </button>
                <button onclick="navigateTo('chart-analysis')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="scan-eye" class="w-5 h-5"></i><span>Chart Analysis</span>
                </button>
                <button onclick="navigateTo('discipline')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="shield-check" class="w-5 h-5"></i><span>Discipline</span>
                </button>
                <button onclick="navigateTo('mentor')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="message-circle" class="w-5 h-5"></i><span>AI Mentor</span>
                </button>
                <button onclick="navigateTo('courses')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="graduation-cap" class="w-5 h-5"></i><span>Courses</span>
                </button>
                <button onclick="navigateTo('webinars')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="video" class="w-5 h-5"></i><span>Webinars</span>
                </button>
                <button onclick="navigateTo('subscription')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="crown" class="w-5 h-5"></i><span>Subscription</span>
                </button>
                <button onclick="navigateTo('blog')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-white/5 transition-all">
                    <i data-lucide="newspaper" class="w-5 h-5"></i><span>Blog</span>
                </button>
            </nav>
            <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-white/5">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all">
                    <i data-lucide="log-out" class="w-5 h-5"></i><span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="lg:ml-64 min-h-screen pb-20 lg:pb-0">
            <div id="page-content" class="p-4 lg:p-8"></div>
        </main>

        <!-- Mobile Bottom Navigation -->
        <nav class="hide-desktop fixed bottom-0 left-0 right-0 glass z-50 border-t border-white/5">
            <div class="flex justify-around py-2">
                <button onclick="navigateTo('dashboard')" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                    <i data-lucide="home" class="w-5 h-5"></i><span class="text-xs">Home</span>
                </button>
                <button onclick="navigateTo('analytics')" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-xs">Stats</span>
                </button>
                <button onclick="navigateTo('journal')" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                    <div class="w-10 h-10 -mt-4 bg-gradient-to-br from-blue-500 to-violet-600 rounded-full flex items-center justify-center">
                        <i data-lucide="plus" class="w-5 h-5 text-white"></i>
                    </div>
                </button>
                <button onclick="navigateTo('performance')" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                    <i data-lucide="target" class="w-5 h-5"></i><span class="text-xs">AI</span>
                </button>
                <button onclick="showMoreMenu()" class="flex flex-col items-center gap-1 p-2 text-slate-400">
                    <i data-lucide="more-horizontal" class="w-5 h-5"></i><span class="text-xs">More</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Mobile More Menu Modal -->
    <div id="more-menu" class="hidden fixed inset-0 z-50">
        <div class="absolute inset-0 bg-black/60" onclick="hideMoreMenu()"></div>
        <div class="absolute bottom-20 left-4 right-4 glass rounded-2xl p-4">
            <div class="grid grid-cols-3 gap-4">
                <button onclick="hideMoreMenu(); navigateTo('chart-analysis')" class="flex flex-col items-center gap-2 p-3 rounded-lg hover:bg-white/5">
                    <i data-lucide="scan-eye" class="w-6 h-6 text-blue-400"></i><span class="text-xs">Analyze</span>
                </button>
                <button onclick="hideMoreMenu(); navigateTo('discipline')" class="flex flex-col items-center gap-2 p-3 rounded-lg hover:bg-white/5">
                    <i data-lucide="shield-check" class="w-6 h-6 text-green-400"></i><span class="text-xs">Discipline</span>
                </button>
                <button onclick="hideMoreMenu(); navigateTo('mentor')" class="flex flex-col items-center gap-2 p-3 rounded-lg hover:bg-white/5">
                    <i data-lucide="message-circle" class="w-6 h-6 text-violet-400"></i><span class="text-xs">Mentor</span>
                </button>
                <button onclick="hideMoreMenu(); navigateTo('courses')" class="flex flex-col items-center gap-2 p-3 rounded-lg hover:bg-white/5">
                    <i data-lucide="graduation-cap" class="w-6 h-6 text-yellow-400"></i><span class="text-xs">Courses</span>
                </button>
                <button onclick="hideMoreMenu(); navigateTo('webinars')" class="flex flex-col items-center gap-2 p-3 rounded-lg hover:bg-white/5">
                    <i data-lucide="video" class="w-6 h-6 text-red-400"></i><span class="text-xs">Webinars</span>
                </button>
                <button onclick="hideMoreMenu(); navigateTo('subscription')" class="flex flex-col items-center gap-2 p-3 rounded-lg hover:bg-white/5">
                    <i data-lucide="crown" class="w-6 h-6 text-amber-400"></i><span class="text-xs">Pro</span>
                </button>
            </div>
        </div>
    </div>

    <script>

        // ============================================
        // API CONFIGURATION - CORS FIX
        // ============================================
        const CURRENT_DOMAIN = window.location.hostname;
        const API_URL = CURRENT_DOMAIN.includes('localhost') || CURRENT_DOMAIN.includes('127.0.0.1')
            ? 'http://localhost:8000'
            : 'https://pipways-api-nhem.onrender.com';

        // State
        let currentUser = null;
        let authToken = localStorage.getItem('pipways_token');
        let currentPage = 'dashboard';

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { info: 'bg-blue-500', success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg animate-fade-in`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatNumber(num) {
            return num?.toLocaleString() || '0';
        }

        function getGradeColor(grade) {
            const colors = { 'A': 'text-green-400', 'B': 'text-blue-400', 'C': 'text-yellow-400', 'D': 'text-red-400' };
            return colors[grade] || 'text-slate-400';
        }

        // ============================================
        // API HELPER
        // ============================================
        async function apiCall(endpoint, options = {}) {
            const url = `${API_URL}${endpoint}`;
            const config = {
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                },
                ...options
            };

            try {
                const response = await fetch(url, config);
                if (response.status === 401) {
                    logout();
                    throw new Error('Session expired. Please login again.');
                }
                return response;
            } catch (error) {
                console.error('API Error:', error);
                // Handle network errors or other fetch failures
                if (error instanceof TypeError && error.message.includes('fetch')) {
                    throw new Error('Network error. Please check your connection.');
                }
                throw error;
            }
        }

        // ============================================
        // AUTHENTICATION
        // ============================================
        function switchAuthTab(tab) {
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
            document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
            document.getElementById('login-tab').className = `flex-1 py-2 px-4 rounded-md text-sm font-medium ${tab === 'login' ? 'bg-blue-600 text-white' : 'text-slate-400'}`;
            document.getElementById('register-tab').className = `flex-1 py-2 px-4 rounded-md text-sm font-medium ${tab === 'register' ? 'bg-blue-600 text-white' : 'text-slate-400'}`;
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                if (!response.ok) {
                    const errorMsg = typeof data.detail === 'string' ? data.detail : 
                                    typeof data.detail === 'object' && data.detail !== null ? JSON.stringify(data.detail) : 
                                    data.message || 'Login failed';
                    throw new Error(errorMsg);
                }

                authToken = data.access_token;
                currentUser = data;
                localStorage.setItem('pipways_token', authToken);
                showApp();
                showToast('Welcome back!', 'success');
            } catch (error) {
                console.error('Login error:', error);
                let errorMsg = 'Login failed. Please try again.';
                
                if (error && typeof error.message === 'string') {
                    errorMsg = error.message;
                } else if (typeof error === 'string') {
                    errorMsg = error;
                }
                
                // Check if it's a network error
                if (errorMsg.includes('fetch') || errorMsg.includes('Network')) {
                    errorMsg = 'Network error. Please check your connection.';
                }
                
                showToast(errorMsg, 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const formData = new URLSearchParams();
                formData.append('name', name);
                formData.append('email', email);
                formData.append('password', password);

                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                if (!response.ok) {
                    const errorMsg = typeof data.detail === 'string' ? data.detail : 
                                    typeof data.detail === 'object' && data.detail !== null ? JSON.stringify(data.detail) : 
                                    data.message || 'Registration failed';
                    throw new Error(errorMsg);
                }

                authToken = data.access_token;
                currentUser = data;
                localStorage.setItem('pipways_token', authToken);
                showApp();
                showToast('Welcome! Your trial has started.', 'success');
            } catch (error) {
                console.error('Register error:', error);
                let errorMsg = 'Registration failed. Please try again.';
                
                if (error && typeof error.message === 'string') {
                    errorMsg = error.message;
                } else if (typeof error === 'string') {
                    errorMsg = error;
                }
                
                // Check if it's a network error
                if (errorMsg.includes('fetch') || errorMsg.includes('Network')) {
                    errorMsg = 'Network error. Please check your connection.';
                }
                
                showToast(errorMsg, 'error');
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('pipways_token');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            navigateTo('dashboard');
            lucide.createIcons();
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function navigateTo(page) {
            currentPage = page;
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`[onclick="navigateTo('${page}')"]`).forEach(el => el.classList.add('active'));

            const renderers = {
                'dashboard': renderDashboard,
                'journal': renderJournal,
                'analytics': renderAnalytics,
                'performance': renderPerformance,
                'chart-analysis': renderChartAnalysis,
                'discipline': renderDiscipline,
                'mentor': renderMentor,
                'courses': renderCourses,
                'webinars': renderWebinars,
                'subscription': renderSubscription,
                'blog': renderBlog
            };

            if (renderers[page]) {
                renderers[page]();
            }
            lucide.createIcons();
        }

        function showMoreMenu() {
            document.getElementById('more-menu').classList.remove('hidden');
        }

        function hideMoreMenu() {
            document.getElementById('more-menu').classList.add('hidden');
        }

        // ============================================
        // PAGE RENDERERS
        // ============================================
        async function renderDashboard() {
            const container = document.getElementById('page-content');
            container.innerHTML = '<div class="flex justify-center py-20"><div class="loading-spinner w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full"></div></div>';

            try {
                const response = await apiCall('/trades');
                const trades = await response.json();

                const totalPips = trades.reduce((sum, t) => sum + (t.pips || 0), 0);
                const wins = trades.filter(t => t.pips > 0).length;
                const winRate = trades.length ? Math.round((wins / trades.length) * 100) : 0;

                container.innerHTML = `
                    <div class="animate-fade-in">
                        <div class="flex justify-between items-center mb-6">
                            <h1 class="text-2xl font-bold">Dashboard</h1>
                            <button onclick="navigateTo('journal')" class="btn-primary px-4 py-2 rounded-lg">+ New Trade</button>
                        </div>
                        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <div class="glass rounded-xl p-4">
                                <div class="text-slate-400 text-sm mb-1">Total Trades</div>
                                <div class="text-2xl font-bold">${trades.length}</div>
                            </div>
                            <div class="glass rounded-xl p-4">
                                <div class="text-slate-400 text-sm mb-1">Win Rate</div>
                                <div class="text-2xl font-bold ${winRate >= 50 ? 'text-green-400' : 'text-red-400'}">${winRate}%</div>
                            </div>
                            <div class="glass rounded-xl p-4">
                                <div class="text-slate-400 text-sm mb-1">Total Pips</div>
                                <div class="text-2xl font-bold ${totalPips >= 0 ? 'text-green-400' : 'text-red-400'}">${totalPips > 0 ? '+' : ''}${totalPips}</div>
                            </div>
                            <div class="glass rounded-xl p-4">
                                <div class="text-slate-400 text-sm mb-1">Discipline</div>
                                <div class="text-2xl font-bold text-blue-400">87%</div>
                            </div>
                        </div>
                        <div class="glass rounded-xl p-6">
                            <h2 class="text-lg font-semibold mb-4">Recent Trades</h2>
                            ${trades.slice(0, 5).map(t => `
                                <div class="flex justify-between items-center py-3 border-b border-white/5">
                                    <div class="flex items-center gap-4">
                                        <span class="text-slate-400 text-sm">${formatDate(t.created_at)}</span>
                                        <span class="font-semibold">${t.pair}</span>
                                        <span class="px-2 py-1 rounded text-xs ${t.direction === 'LONG' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${t.direction}</span>
                                    </div>
                                    <span class="font-mono font-bold ${t.pips >= 0 ? 'text-green-400' : 'text-red-400'}">${t.pips > 0 ? '+' : ''}${t.pips}</span>
                                </div>
                            `).join('') || '<p class="text-slate-500 text-center py-8">No trades yet</p>'}
                        </div>
                    </div>
                `;
            } catch (error) {
                const errorMsg = error && typeof error.message === 'string' ? error.message : 
                                typeof error === 'string' ? error : 
                                'Failed to load dashboard';
                container.innerHTML = `<div class="text-red-400 text-center py-20">Error loading dashboard: ${errorMsg}</div>`;
            }
        }

        async function renderJournal() {
            const container = document.getElementById('page-content');
            container.innerHTML = `
                <div class="animate-fade-in">
                    <h1 class="text-2xl font-bold mb-6">Trade Journal</h1>
                    <div class="glass rounded-xl p-6 mb-6">
                        <h2 class="text-lg font-semibold mb-4">Log New Trade</h2>

        async function handleTradeSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);

            try {
                const response = await apiCall('/trades', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(formData)
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Failed to save trade');
                }

                showToast('Trade saved successfully!', 'success');
                e.target.reset();
                loadTradesList();
            } catch (error) {
                const errorMsg = error && typeof error.message === 'string' ? error.message : 
                                typeof error === 'string' ? error : 
                                'Failed to save trade';
                showToast(errorMsg, 'error');
            }

        async function sendQuickMessage(message) {
            document.getElementById('mentor-input').value = message;
            sendMentorMessage({ preventDefault: () => {} });
        }

        async function sendMentorMessage(e) {
            e.preventDefault();
            const input = document.getElementById('mentor-input');
            const message = input.value.trim();
            if (!message) return;

            const chatContainer = document.getElementById('chat-messages');
            chatContainer.innerHTML += `
                <div class="flex items-start gap-4 mb-4 justify-end">
                    <div class="bg-blue-600 rounded-lg p-4 max-w-[80%]">
                        <p>${message}</p>
                    </div>
                </div>
            `;
            input.value = '';

            try {
                const response = await apiCall(`/mentor-chat?message=${encodeURIComponent(message)}`);
                const data = await response.json();

                chatContainer.innerHTML += `
                    <div class="flex items-start gap-4 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center flex-shrink-0">
                            <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                        </div>
                        <div class="bg-slate-800/50 rounded-lg p-4 max-w-[80%]">
                            <p>${data.response}</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (error) {
                showToast('Failed to get response', 'error');
            }
        }
