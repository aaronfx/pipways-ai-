<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { 
            font-family: 'Inter', sans-serif; 
        }
        
        .mono { 
            font-family: 'JetBrains Mono', monospace; 
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .sidebar-link {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
            color: #60a5fa;
        }
        
        .metric-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chart-container {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            background: #0f172a;
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 1024px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .hidden { display: none !important; }
        
        /* Line clamp utilities */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
<base target="_blank">

<script>
const API_URL = 'https://pipways-api-nhem.onrender.com';
let authToken = localStorage.getItem('pipways_token');
let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');

if (authToken) {
    showApp();
} else {
    showAuth();
}

function showAuth() {
    document.getElementById('auth-screen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}

function showApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    showPage('dashboard');
}

function showAuthTab(tab) {
    const loginBtn = document.getElementById('tab-login');
    const registerBtn = document.getElementById('tab-register');
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    
    if (tab === 'login') {
        loginBtn.classList.add('bg-blue-500', 'text-white');
        loginBtn.classList.remove('text-slate-400');
        registerBtn.classList.remove('bg-blue-500', 'text-white');
        registerBtn.classList.add('text-slate-400');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        registerBtn.classList.add('bg-blue-500', 'text-white');
        registerBtn.classList.remove('text-slate-400');
        loginBtn.classList.remove('bg-blue-500', 'text-white');
        loginBtn.classList.add('text-slate-400');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
    document.getElementById('auth-error').classList.add('hidden');
}

function getErrorMessage(data) {
    if (typeof data === 'string') return data;
    if (data.detail) {
        if (typeof data.detail === 'string') return data.detail;
        if (Array.isArray(data.detail)) {
            return data.detail.map(err => {
                if (typeof err === 'string') return err;
                if (err.msg) return err.msg;
                if (err.message) return err.message;
                return JSON.stringify(err);
            }).join(', ');
        }
        return JSON.stringify(data.detail);
    }
    if (data.message) return data.message;
    if (data.error) return data.error;
    return JSON.stringify(data);
}

async function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        
        const response = await fetch(API_URL + '/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

async function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    const errorEl = document.getElementById('auth-error');
    
    try {
        const formData = new URLSearchParams();
        formData.append('email', form.email.value);
        formData.append('password', form.password.value);
        formData.append('name', form.name.value);
        
        const response = await fetch(API_URL + '/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: formData.toString()
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(data));
        }
        
        authToken = data.access_token;
        currentUser = data;
        localStorage.setItem('pipways_token', authToken);
        localStorage.setItem('pipways_user', JSON.stringify(data));
        showApp();
        
    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
    }
}

function logout() {
    localStorage.removeItem('pipways_token');
    localStorage.removeItem('pipways_user');
    authToken = null;
    currentUser = {};
    showAuth();
}

async function apiCall(endpoint, options = {}) {
    const headers = {
        'Authorization': 'Bearer ' + authToken,
        ...options.headers
    };
    
    const response = await fetch(API_URL + endpoint, {
        ...options,
        headers
    });
    
    if (response.status === 401) {
        logout();
        throw new Error('Session expired. Please login again.');
    }
    
    return response;
}

async function showPage(page) {
    const content = document.getElementById('content');
    
    // Update sidebar active state
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    const activeBtn = document.querySelector('[onclick="showPage(\'' + page + '\')"]');
    if (activeBtn) {
        activeBtn.classList.add('active');
    }

    if (page === 'dashboard') {
        await renderDashboard(content);
    } else if (page === 'journal') {
        renderJournal(content);
    } else if (page === 'analysis') {
        renderChartAnalysis(content);
    } else if (page === 'trade-analysis') {
        renderTradeAnalysis(content);
    } else if (page === 'discipline') {
        renderDiscipline(content);
    } else if (page === 'mentor') {
        renderMentor(content);
    } else if (page === 'blog') {
        renderBlog(content);
    } else if (page === 'admin') {
        renderAdmin(content);
    }
    
    // Show admin nav if user is admin
    if (currentUser.is_admin) {
        const adminNav = document.getElementById('admin-nav');
        if (adminNav) adminNav.classList.remove('hidden');
    }
    
    lucide.createIcons();
}

async function renderDashboard(content) {
    try {
        const response = await apiCall('/trades');
        const trades = await response.json();
        
        if (!response.ok) {
            throw new Error(getErrorMessage(trades));
        }
        
        const totalPips = trades.reduce((a, b) => a + (b.pips || 0), 0);
        const wins = trades.filter(t => t.pips > 0).length;
        const winRate = trades.length ? (wins / trades.length * 100).toFixed(0) : 0;
        
        let html = '<div class="p-8 max-w-7xl mx-auto">';
        html += '<div class="flex items-center justify-between mb-8">';
        html += '<div>';
        html += '<h2 class="text-3xl font-bold text-white mb-1">Dashboard</h2';
        html += '<p class="text-slate-400">Welcome back, ' + (currentUser.name || 'Trader') + '</p>';
        html += '</div>';
        html += '<button onclick="showPage(\'journal\')" class="btn-primary px-6 py-2.5 rounded-lg text-white font-medium flex items-center gap-2">';
        html += '<i data-lucide="plus" class="w-4 h-4"></i> New Trade';
        html += '</button>';
        html += '</div>';
        
        // Metrics Grid
        html += '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">';
        
        // Discipline Score
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">';
        html += '<i data-lucide="shield" class="w-6 h-6 text-blue-400"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-emerald-400 flex items-center gap-1">';
        html += '<i data-lucide="trending-up" class="w-3 h-3"></i> +12%';
        html += '</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Discipline Score</div>';
        html += '<div class="text-3xl font-bold text-white">87<span class="text-lg text-slate-500">/100</span></div>';
        html += '</div>';
        
        // Win Rate
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg bg-violet-500/20 flex items-center justify-center">';
        html += '<i data-lucide="target" class="w-6 h-6 text-violet-400"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-slate-500">All time</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Win Rate</div>';
        html += '<div class="text-3xl font-bold text-white">' + winRate + '<span class="text-lg text-slate-500">%</span></div>';
        html += '</div>';
        
        // Total Pips
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg ' + (totalPips >= 0 ? 'bg-emerald-500/20' : 'bg-red-500/20') + ' flex items-center justify-center">';
        html += '<i data-lucide="activity" class="w-6 h-6 ' + (totalPips >= 0 ? 'text-emerald-400' : 'text-red-400') + '"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-slate-500">Total</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Total Pips</div>';
        html += '<div class="text-3xl font-bold ' + (totalPips >= 0 ? 'text-emerald-400' : 'text-red-400') + '">';
        html += (totalPips > 0 ? '+' : '') + totalPips;
        html += '</div>';
        html += '</div>';
        
        // Total Trades
        html += '<div class="metric-card rounded-xl p-6 card-hover">';
        html += '<div class="flex items-center justify-between mb-4">';
        html += '<div class="w-12 h-12 rounded-lg bg-blue-500/20 flex items-center justify-center">';
        html += '<i data-lucide="bar-chart-2" class="w-6 h-6 text-blue-400"></i>';
        html += '</div>';
        html += '<span class="text-xs font-medium text-slate-500">Total</span>';
        html += '</div>';
        html += '<div class="text-slate-400 text-sm mb-1">Total Trades</div>';
        html += '<div class="text-3xl font-bold text-white">' + trades.length + '</div>';
        html += '</div>';
        
        html += '</div>';
        
        // Recent Trades
        html += '<div class="glass rounded-2xl p-6 mb-8">';
        html += '<h3 class="font-semibold text-white mb-4">Recent Trades</h3>';
        html += '<div class="space-y-3">';
        trades.slice(0, 5).forEach(t => {
            html += '<div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg">';
            html += '<div class="flex items-center gap-3">';
            html += '<div class="w-10 h-10 rounded-lg ' + (t.pips >= 0 ? 'bg-emerald-500/20' : 'bg-red-500/20') + ' flex items-center justify-center">';
            html += '<i data-lucide="' + (t.direction.toLowerCase() === 'long' ? 'trending-up' : 'trending-down') + '" class="w-5 h-5 ' + (t.pips >= 0 ? 'text-emerald-400' : 'text-red-400') + '"></i>';

async function loadBlogPosts(category = 'all', search = '') {
    try {
        let url = '/blog/posts?page=1&per_page=30';
        if (category !== 'all') url += '&category=' + category;
        if (search) url += '&search=' + search;
        
        const response = await apiCall(url);
        const data = await response.json();
        
        let html = '';
        data.posts.forEach(p => {
            html += '<div class="glass rounded-xl overflow-hidden card-hover cursor-pointer" onclick="showBlogPost(\'' + p.slug + '\')">';
            if (p.featured_image) {
                html += '<img src="' + p.featured_image + '" class="w-full h-48 object-cover">';
            } else {
                html += '<div class="w-full h-48 bg-slate-800 flex items-center justify-center">';
                html += '<i data-lucide="image" class="w-12 h-12 text-slate-600"></i>';
                html += '</div>';
            }
            html += '<div class="p-6">';
            html += '<div class="text-sm text-slate-400 mb-2">' + (p.category || 'General') + '</div>';
            html += '<h3 class="text-xl font-bold text-white mb-2 line-clamp-2">' + p.title + '</h3>';
            html += '<p class="text-slate-400 text-sm line-clamp-3 mb-4">' + (p.excerpt || '') + '</p>';
            html += '<div class="flex items-center justify-between text-xs text-slate-500">';
            html += '<span>' + new Date(p.published_at).toLocaleDateString() + '</span>';
            html += '<span>' + p.view_count + ' views</span>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
        });
        
        document.getElementById('blogList').innerHTML = html || '<p class="text-slate-500 col-span-3">No posts found</p>';
        lucide.createIcons();
        
    } catch (err) {
        document.getElementById('blogList').innerHTML = '<p class="text-red-400 col-span-3">Error loading posts</p>';
    }
}

function filterBlog(category) {
    // Update active button
    const buttons = document.querySelectorAll('#blogCategories button');
    buttons.forEach(function(btn) {
        if (btn.textContent.toLowerCase().includes(category.replace('-', ' ')) || (category === 'all' && btn.textContent === 'All')) {
            btn.classList.remove('bg-slate-800', 'text-slate-300');
            btn.classList.add('bg-blue-500', 'text-white');
        } else {
            btn.classList.remove('bg-blue-500', 'text-white');
            btn.classList.add('bg-slate-800', 'text-slate-300');
        }
    });
    
    loadBlogPosts(category);
}

function searchBlog() {
    const search = document.getElementById('blogSearch').value;
    loadBlogPosts('all', search);
}

async function showBlogPost(slug) {
    try {
        const response = await apiCall('/blog/post/' + slug);
        const post = await response.json();
        
        if (!response.ok) {
            throw new Error('Post not found');
        }
        
        const content = document.getElementById('content');
        const date = new Date(post.published_at);
        
        let html = '<div class="p-8 max-w-4xl mx-auto fade-in">';
        html += '<button onclick="showPage(\'blog\')" class="mb-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors">';
        html += '<i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Blog';
        html += '</button>';
        
        if (post.featured_image) {
            html += '<div class="h-64 rounded-xl bg-cover bg-center mb-8" style="background-image: url(\'' + post.featured_image + '\')"></div>';
        }
        
        html += '<div class="flex items-center gap-2 mb-4">';
        html += '<span class="px-3 py-1 bg-blue-500/20 text-blue-400 text-sm rounded">' + (post.category || 'General') + '</span>';
        html += '<span class="text-slate-500 text-sm">' + date.toLocaleDateString() + '</span>';
        html += '<span class="text-slate-500 text-sm">' + post.reading_time + ' min read</span>';
        html += '<span class="text-slate-500 text-sm">' + post.view_count + ' views</span>';
        html += '</div>';
        
        html += '<h1 class="text-4xl font-bold text-white mb-6">' + post.title + '</h1>';
        
        if (post.tags && post.tags.length > 0) {
            html += '<div class="flex gap-2 mb-8">';
            post.tags.forEach(function(tag) {
                html += '<span class="px-2 py-1 bg-slate-800 text-slate-400 text-xs rounded">' + tag + '</span>';
            });
            html += '</div>';
        }
        
        html += '<div class="prose prose-invert max-w-none">';
        html += '<div class="text-slate-300 leading-relaxed">' + renderContentBlocks(post.content_json.blocks) + '</div>';
        html += '</div>';
        
        // Social shares
        html += '<div class="mt-8 flex gap-4">';
        html += '<a href="https://twitter.com/intent/tweet?url=https://pipways.com/blog/' + slug + '&text=' + post.title + '" class="px-4 py-2 bg-blue-400 rounded text-white">Twitter</a>';
        html += '<a href="https://www.linkedin.com/shareArticle?mini=true&url=https://pipways.com/blog/' + slug + '&title=' + post.title + '" class="px-4 py-2 bg-blue-700 rounded text-white">LinkedIn</a>';
        html += '</div>';
        
        html += '</div>';
        
        content.innerHTML = html;
        lucide.createIcons();
        
    } catch (err) {
        alert('Error loading post: ' + err.message);
    }
}

function renderContentBlocks(blocks) {
    let html = '';
    blocks.forEach(b => {
        switch (b.type) {
            case 'header':
                html += `<h${b.data.level}>${b.data.text}</h${b.data.level}>`;
                break;
            case 'paragraph':
                html += `<p>${b.data.text}</p>`;
                break;
            case 'list':
                const tag = b.data.style === 'ordered' ? 'ol' : 'ul';
                html += `<${tag}>${b.data.items.map(i => `<li>${i}</li>`).join('')}</${tag}>`;
                break;
            case 'quote':
                html += `<blockquote>${b.data.text}</blockquote>`;
                break;
            case 'table':
                html += '<table>' + b.data.content.map(row => '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>').join('') + '</table>';
                break;
            case 'code':
                html += `<pre><code>${b.data.code}</code></pre>`;
                break;
            case 'image':
                html += `<img src="${b.data.file.url}" alt="${b.data.caption || ''}" class="w-full rounded">`;
                if (b.data.caption) html += `<figcaption>${b.data.caption}</figcaption>`;
                break;
            case 'embed':
                html += `<iframe src="${b.data.embed}" width="100%" height="400" frameborder="0"></iframe>`;
                break;
            case 'delimiter':
                html += '<hr class="my-8">';
                break;
        }
    });
    return html;
}
