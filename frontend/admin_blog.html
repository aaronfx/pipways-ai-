<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Pipways Trading Academy</title>
    <meta name="description" content="Expert trading insights, strategies, and psychology tips from Pipways Trading Academy.">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        header {
            text-align: center;
            margin-bottom: 60px;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
        }
        
        header h1 { font-size: 3em; margin-bottom: 20px; color: #60a5fa; }
        header p { font-size: 1.2em; color: #94a3b8; max-width: 600px; margin: 0 auto; }
        
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #94a3b8;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        
        .blog-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .blog-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .blog-card-content { padding: 25px; }
        
        .category {
            display: inline-block;
            padding: 5px 15px;
            background: #3b82f6;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 15px;
        }
        
        .blog-card h2 {
            font-size: 1.4em;
            margin-bottom: 15px;
            color: #f1f5f9;
        }
        
        .blog-card p {
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .meta {
            display: flex;
            gap: 20px;
            color: #64748b;
            font-size: 14px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 60px;
        }
        
        .page-btn {
            padding: 10px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .page-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        
        @media (max-width: 768px) {
            header h1 { font-size: 2em; }
            .blog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Trading Insights & Education</h1>
            <p>Master the markets with expert analysis, proven strategies, and trading psychology tips from our team of professional traders.</p>
        </header>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterPosts('all')">All</button>
            <button class="filter-btn" onclick="filterPosts('Psychology')">Psychology</button>
            <button class="filter-btn" onclick="filterPosts('Strategy')">Strategy</button>
            <button class="filter-btn" onclick="filterPosts('Risk Management')">Risk Management</button>
            <button class="filter-btn" onclick="filterPosts('Technical Analysis')">Technical Analysis</button>
        </div>
        
        <div id="blog-grid" class="blog-grid">
            <!-- Posts loaded dynamically -->
        </div>
        
        <div id="pagination" class="pagination">
            <!-- Pagination loaded dynamically -->
        </div>
    </div>

    <script>
        const API_BASE = 'https://pipways-api-nhem.onrender.com';
        let currentPage = 1;
        let currentCategory = null;
        
        async function loadPosts(page = 1, category = null) {
            try {
                let url = `${API_BASE}/posts?page=${page}&per_page=9`;
                if (category && category !== 'all') {
                    url += `&category=${encodeURIComponent(category)}`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                const grid = document.getElementById('blog-grid');
                grid.innerHTML = '';
                
                data.posts.forEach(post => {
                    const card = document.createElement('article');
                    card.className = 'blog-card';
                    card.onclick = () => window.location.href = `/blog/${post.slug}`;
                    card.innerHTML = `
                        ${post.featured_image ? `<img src="${post.featured_image}" alt="${post.title}">` : ''}
                        <div class="blog-card-content">
                            ${post.category ? `<span class="category">${post.category}</span>` : ''}
                            <h2>${post.title}</h2>
                            <p>${post.excerpt || ''}</p>
                            <div class="meta">
                                <span>⏱️ ${post.reading_time || 5} min read</span>
                                <span>👁️ ${post.view_count || 0} views</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                // Pagination
                const pagination = document.getElementById('pagination');
                pagination.innerHTML = '';
                for (let i = 1; i <= data.pagination.total_pages; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'page-btn' + (i === page ? ' active' : '');
                    btn.textContent = i;
                    btn.onclick = () => loadPosts(i, currentCategory);
                    pagination.appendChild(btn);
                }
                
            } catch (error) {
                console.error('Error loading posts:', error);
            }
        }
        
        function filterPosts(category) {
            currentCategory = category;
            currentPage = 1;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (category === 'all' ? 'All' : category)) {
                    btn.classList.add('active');
                }
            });
            
            loadPosts(1, category);
        }
        
        loadPosts();
    </script>
</body>
</html>
