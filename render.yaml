# Render Configuration for Pipways v3.0
# Service: pipways-api
# Runtime: Python 3.11
# Framework: FastAPI with Uvicorn

services:
  # Web Service Configuration
  - type: web
    name: pipways-api
    runtime: python
    version: "3.11"
    
    # Build Configuration
    buildCommand: pip install -r requirements.txt
    
    # Start Command
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    
    # Health Check Configuration
    healthCheckPath: /health
    
    # Auto-deploy Settings
    autoDeploy: true
    
    # Environment Variables
    envVars:
      # Database Configuration
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString
        sync: false
      
      # JWT Secret Key (auto-generated)
      - key: SECRET_KEY
        generateValue: true
        sync: false
      
      # AI Services
      - key: OPENROUTER_API_KEY
        sync: false
      
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      
      # Payment Processing - Paystack
      - key: PAYSTACK_SECRET_KEY
        sync: false
      
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      
      # Email Service - SendGrid
      - key: SENDGRID_API_KEY
        sync: false
      
      # Environment Configuration
      - key: ENVIRONMENT
        value: production
      
      # Frontend URL for CORS
      - key: FRONTEND_URL
        value: "https://pipways-web.onrender.com"
      
      # Debug Mode
      - key: DEBUG
        value: "false"
    
    # Disk for file uploads
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 5

# PostgreSQL Database Configuration
databases:
  - name: pipways-db
    databaseName: pipways
    user: pipways_user
    plan: starter  # Change to 'pro' for production
    ipAllowList: []  # Allow all IPs (for Render services)

# Environment Group for shared variables
envVarGroups:
  - name: pipways-api-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
