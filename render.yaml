services:
  # Frontend (Static Site)
  - type: web
    name: pipways-web
    runtime: static
    buildCommand: ""
    staticPublishPath: ./
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_URL
        value: https://pipways-api.onrender.com

  # Backend (Python API)
  - type: web
    name: pipways-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # You'll add this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"

  # Database (PostgreSQL)
databases:
  - name: pipways-db
    databaseName: pipways
    user: pipways
    plan: free
