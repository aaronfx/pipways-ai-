# Render Configuration for FastAPI Application
# Service: pipways-api
# Runtime: Python 3.11
# Framework: FastAPI with Uvicorn

services:
  # Web Service Configuration
  - type: web
    name: pipways-api
    runtime: python
    version: "3.11"
    
    # Build Configuration
    buildCommand: pip install -r requirements.txt
    
    # Start Command
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    
    # Health Check Configuration
    healthCheckPath: /health
    
    # Auto-deploy Settings
    autoDeploy: true
    
    # Environment Variables
    envVars:
      # Database Configuration
      - key: DATABASE_URL
        value: "postgresql://username:password@host:port/database_name"
        sync: false
      
      # JWT Secret Key
      - key: SECRET_KEY
        generateValue: true
        sync: false
      
      # AI Mentor - OpenRouter API Key
      - key: OPENROUTER_API_KEY
        sync: false
      
      # Payment Processing - Paystack
      - key: PAYSTACK_SECRET_KEY
        sync: false
      
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      
      # Environment Configuration
      - key: ENVIRONMENT
        value: production
      
      # Frontend URL for CORS
      - key: FRONTEND_URL
        value: "https://your-frontend-domain.com"
      
      # Render automatically sets PORT, but we can ensure it's available
      - key: PORT
        value: 8000

# Optional: Database Configuration (if using Render PostgreSQL)
databases:
  - name: pipways-db
    databaseName: pipways
    user: pipways_user
    plan: free  # Change to 'starter' or higher for production

# Optional: Environment Group for shared variables
envVarGroups:
  - name: pipways-api-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
