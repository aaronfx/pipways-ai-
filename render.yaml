services:
  # Static Website (Frontend)
  - type: web
    name: pipways-web
    runtime: static
    buildCommand: ""  # Empty for now
    staticPublishPath: ./
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VERSION
        value: "1.0.0"

