services:
  - type: web
    name: pipways-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
databases:
  - name: pipways-db
    plan: free
